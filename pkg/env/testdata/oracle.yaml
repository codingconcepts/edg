globals:
  seed_count: 20
  test_value: 42

expressions:
  double: "args[0] * 2"

up:

  - name: create_ref_source
    type: exec
    query: |-
      CREATE TABLE test_ref_source (
        id NUMBER(10) PRIMARY KEY,
        name VARCHAR2(255) NOT NULL,
        weight NUMBER(10) DEFAULT 1 NOT NULL
      )

  - name: create_scalars
    type: exec
    query: |-
      CREATE TABLE test_scalars (
        seq_id NUMBER(10),
        const_val NUMBER(10),
        global_val NUMBER(10),
        expr_val NUMBER(10),
        gen_val VARCHAR2(255),
        regex_val VARCHAR2(255),
        tmpl_val VARCHAR2(255),
        cond_val VARCHAR2(255),
        coal_val VARCHAR2(255),
        expr_fn_val NUMBER
      )

  - name: create_uuids
    type: exec
    query: |-
      CREATE TABLE test_uuids (
        v1 VARCHAR2(36) NOT NULL,
        v4 VARCHAR2(36) NOT NULL,
        v6 VARCHAR2(36) NOT NULL,
        v7 VARCHAR2(36) NOT NULL
      )

  - name: create_numbers
    type: exec
    query: |-
      CREATE TABLE test_numbers (
        float_val NUMBER,
        uniform_val NUMBER,
        norm_val NUMBER,
        norm_f_val NUMBER,
        zipf_val NUMBER(10)
      )

  - name: create_sets
    type: exec
    query: |-
      CREATE TABLE test_sets (
        rand_val VARCHAR2(255),
        weighted_val VARCHAR2(255),
        normal_val VARCHAR2(255),
        exp_val VARCHAR2(255),
        lognorm_val VARCHAR2(255),
        zipfian_val VARCHAR2(255)
      )

  - name: create_json
    type: exec
    query: |-
      CREATE TABLE test_json (
        obj VARCHAR2(4000),
        arr VARCHAR2(4000)
      )

  - name: create_geo
    type: exec
    query: |-
      CREATE TABLE test_geo (
        lat NUMBER,
        lon NUMBER,
        wkt VARCHAR2(255)
      )

  - name: create_time
    type: exec
    query: |-
      CREATE TABLE test_time (
        ts VARCHAR2(255),
        dur VARCHAR2(255),
        date_str VARCHAR2(255),
        offset_ts VARCHAR2(255),
        time_val VARCHAR2(255),
        timez_val VARCHAR2(255)
      )

  - name: create_distributions
    type: exec
    query: |-
      CREATE TABLE test_distributions (
        nu_val NUMBER(10),
        nu_vals VARCHAR2(255),
        norm_vals VARCHAR2(255),
        exp_val NUMBER,
        lognorm_val NUMBER,
        exp_int_val NUMBER,
        lognorm_int_val NUMBER
      )

  - name: create_refs
    type: exec
    query: |-
      CREATE TABLE test_refs (
        rand_id NUMBER(10),
        same_id NUMBER(10),
        same_name VARCHAR2(255),
        ref_n_ids VARCHAR2(255),
        weighted_ids VARCHAR2(255)
      )

  - name: create_ref_diff
    type: exec
    query: |-
      CREATE TABLE test_ref_diff (
        id1 NUMBER(10),
        id2 NUMBER(10)
      )

  - name: create_ref_perm
    type: exec
    query: |-
      CREATE TABLE test_ref_perm (
        perm_id NUMBER(10)
      )

  - name: create_binary
    type: exec
    query: |-
      CREATE TABLE test_binary (
        bytes_val VARCHAR2(255),
        bit_val VARCHAR2(255),
        varbit_val VARCHAR2(255),
        inet_val VARCHAR2(255)
      )

  - name: create_arrays
    type: exec
    query: |-
      CREATE TABLE test_arrays (
        arr_val VARCHAR2(255)
      )

  - name: create_gen_batch
    type: exec
    query: |-
      CREATE TABLE test_gen_batch (
        email VARCHAR2(255) PRIMARY KEY
      )

  - name: create_batch
    type: exec
    query: |-
      CREATE TABLE test_batch (
        val NUMBER(10)
      )

  - name: create_ref_each
    type: exec
    query: |-
      CREATE TABLE test_ref_each (
        source_id NUMBER(10)
      )

  - name: create_agg
    type: exec
    query: |-
      CREATE TABLE test_agg (
        sum_val NUMBER,
        avg_val NUMBER,
        min_val NUMBER,
        max_val NUMBER,
        count_val NUMBER(10),
        distinct_val NUMBER(10)
      )

seed:

  - name: seed_ref_source
    type: exec
    args:
      - seed_count
    query: |-
      INSERT INTO test_ref_source (id, name, weight)
      SELECT level, 'item-' || level, level * 10
      FROM DUAL
      CONNECT BY level <= $1

  - name: seed_gen_batch
    type: exec
    args:
      - gen_batch(10, 5, 'email')
    query: |-
      INSERT INTO test_gen_batch (email)
      SELECT column_value
      FROM XMLTABLE(('"' || REPLACE('$1', CHR(31), '","') || '"'))

  - name: seed_batch
    type: exec
    args:
      - batch(5)
    query: |-
      INSERT INTO test_batch (val) VALUES ($1)

  - name: seed_ref_each
    type: exec
    args:
      - ref_each('SELECT id FROM test_ref_source WHERE id <= 5')
    query: |-
      INSERT INTO test_ref_each (source_id) VALUES ($1)

deseed:

  - name: truncate_agg
    type: exec
    query: TRUNCATE TABLE test_agg

  - name: truncate_ref_each
    type: exec
    query: TRUNCATE TABLE test_ref_each

  - name: truncate_batch
    type: exec
    query: TRUNCATE TABLE test_batch

  - name: truncate_gen_batch
    type: exec
    query: TRUNCATE TABLE test_gen_batch

  - name: truncate_arrays
    type: exec
    query: TRUNCATE TABLE test_arrays

  - name: truncate_binary
    type: exec
    query: TRUNCATE TABLE test_binary

  - name: truncate_ref_perm
    type: exec
    query: TRUNCATE TABLE test_ref_perm

  - name: truncate_ref_diff
    type: exec
    query: TRUNCATE TABLE test_ref_diff

  - name: truncate_refs
    type: exec
    query: TRUNCATE TABLE test_refs

  - name: truncate_distributions
    type: exec
    query: TRUNCATE TABLE test_distributions

  - name: truncate_time
    type: exec
    query: TRUNCATE TABLE test_time

  - name: truncate_geo
    type: exec
    query: TRUNCATE TABLE test_geo

  - name: truncate_json
    type: exec
    query: TRUNCATE TABLE test_json

  - name: truncate_sets
    type: exec
    query: TRUNCATE TABLE test_sets

  - name: truncate_numbers
    type: exec
    query: TRUNCATE TABLE test_numbers

  - name: truncate_uuids
    type: exec
    query: TRUNCATE TABLE test_uuids

  - name: truncate_scalars
    type: exec
    query: TRUNCATE TABLE test_scalars

  - name: truncate_ref_source
    type: exec
    query: TRUNCATE TABLE test_ref_source


    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE lineitem PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_orders
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE orders PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_partsupp
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE partsupp PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_customer
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE customer PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_part
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE part PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_supplier
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE supplier PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_nation
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE nation PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

  - name: drop_region
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE region PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

run_weights:
  q1_pricing_summary: 25
  q3_shipping_priority: 25
  q6_forecasting_revenue: 25
  q14_promotion_effect: 25

run:

  - name: q1_pricing_summary
    type: query
    args:
      - gen('number:60,120')
    query: |-
      SELECT l_returnflag, l_linestatus,
        SUM(l_quantity) AS sum_qty,
        SUM(l_extendedprice) AS sum_base_price,
        SUM(l_extendedprice * (1 - l_discount)) AS sum_disc_price,
        SUM(l_extendedprice * (1 - l_discount) * (1 + l_tax)) AS sum_charge,
        AVG(l_quantity) AS avg_qty,
        AVG(l_extendedprice) AS avg_price,
        AVG(l_discount) AS avg_disc,
        COUNT(*) AS count_order
      FROM lineitem
      WHERE l_shipdate <= DATE '1998-12-01' - :1
      GROUP BY l_returnflag, l_linestatus
      ORDER BY l_returnflag, l_linestatus

  - name: q3_shipping_priority
    type: query
    args:
      - set_rand(['AUTOMOBILE','BUILDING','FURNITURE','MACHINERY','HOUSEHOLD'], [])
      - gen('number:1,31')
    query: |-
      SELECT l.l_orderkey,
        SUM(l.l_extendedprice * (1 - l.l_discount)) AS revenue,
        o.o_orderdate, o.o_shippriority
      FROM customer c
      JOIN orders o ON c.c_custkey = o.o_custkey
      JOIN lineitem l ON l.l_orderkey = o.o_orderkey
      WHERE c.c_mktsegment = :1
        AND o.o_orderdate < DATE '1995-03-01' + :2
        AND l.l_shipdate > DATE '1995-03-01' + :2
      GROUP BY l.l_orderkey, o.o_orderdate, o.o_shippriority
      ORDER BY revenue DESC, o.o_orderdate
      FETCH FIRST 10 ROWS ONLY

  - name: q6_forecasting_revenue
    type: query
    args:
      - gen('number:1993,1997')
      - uniform_f(0.02, 0.09, 2)
      - gen('number:24,25')
    query: |-
      SELECT SUM(l_extendedprice * l_discount) AS revenue
      FROM lineitem
      WHERE l_shipdate >= TO_DATE(:1 || '-01-01', 'YYYY-MM-DD')
        AND l_shipdate < ADD_MONTHS(TO_DATE(:1 || '-01-01', 'YYYY-MM-DD'), 12)
        AND l_discount BETWEEN :2 - 0.01 AND :2 + 0.01
        AND l_quantity < :3

  - name: q14_promotion_effect
    type: query
    args:
      - gen('number:1993,1997')
      - gen('number:1,12')
    query: |-
      SELECT
        100.00 * SUM(CASE WHEN p.p_type LIKE 'PROMO%'
          THEN l.l_extendedprice * (1 - l.l_discount) ELSE 0 END)
        / SUM(l.l_extendedprice * (1 - l.l_discount)) AS promo_revenue
      FROM lineitem l
      JOIN part p ON l.l_partkey = p.p_partkey
      WHERE l_shipdate >= TO_DATE(:1 || '-' || LPAD(:2, 2, '0') || '-01', 'YYYY-MM-DD')
        AND l_shipdate < ADD_MONTHS(
          TO_DATE(:1 || '-' || LPAD(:2, 2, '0') || '-01', 'YYYY-MM-DD'), 1)

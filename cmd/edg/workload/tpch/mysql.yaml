# TPC-H Workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  scale_factor: 1
  regions: 5
  nations: 25
  suppliers: 1000
  parts: 20000
  customers: 15000
  orders: 150000
  batch_size: 10000

up:

  - name: create_region
    query: |-
      CREATE TABLE IF NOT EXISTS region (
        r_regionkey INT NOT NULL PRIMARY KEY,
        r_name VARCHAR(25) NOT NULL,
        r_comment VARCHAR(152)
      )

  - name: create_nation
    query: |-
      CREATE TABLE IF NOT EXISTS nation (
        n_nationkey INT NOT NULL PRIMARY KEY,
        n_name VARCHAR(25) NOT NULL,
        n_regionkey INT NOT NULL,
        n_comment VARCHAR(152)
      )

  - name: create_supplier
    query: |-
      CREATE TABLE IF NOT EXISTS supplier (
        s_suppkey INT NOT NULL PRIMARY KEY,
        s_name VARCHAR(25) NOT NULL,
        s_address VARCHAR(40) NOT NULL,
        s_nationkey INT NOT NULL,
        s_phone VARCHAR(15) NOT NULL,
        s_acctbal DECIMAL(15,2) NOT NULL,
        s_comment VARCHAR(101)
      )

  - name: create_part
    query: |-
      CREATE TABLE IF NOT EXISTS part (
        p_partkey INT NOT NULL PRIMARY KEY,
        p_name VARCHAR(55) NOT NULL,
        p_mfgr VARCHAR(25) NOT NULL,
        p_brand VARCHAR(10) NOT NULL,
        p_type VARCHAR(25) NOT NULL,
        p_size INT NOT NULL,
        p_container VARCHAR(10) NOT NULL,
        p_retailprice DECIMAL(15,2) NOT NULL,
        p_comment VARCHAR(23)
      )

  - name: create_partsupp
    query: |-
      CREATE TABLE IF NOT EXISTS partsupp (
        ps_partkey INT NOT NULL,
        ps_suppkey INT NOT NULL,
        ps_availqty INT NOT NULL,
        ps_supplycost DECIMAL(15,2) NOT NULL,
        ps_comment VARCHAR(199),
        PRIMARY KEY (ps_partkey, ps_suppkey)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        c_custkey INT NOT NULL PRIMARY KEY,
        c_name VARCHAR(25) NOT NULL,
        c_address VARCHAR(40) NOT NULL,
        c_nationkey INT NOT NULL,
        c_phone VARCHAR(15) NOT NULL,
        c_acctbal DECIMAL(15,2) NOT NULL,
        c_mktsegment VARCHAR(10) NOT NULL,
        c_comment VARCHAR(117)
      )

  - name: create_orders
    query: |-
      CREATE TABLE IF NOT EXISTS orders (
        o_orderkey INT NOT NULL PRIMARY KEY,
        o_custkey INT NOT NULL,
        o_orderstatus CHAR(1) NOT NULL,
        o_totalprice DECIMAL(15,2) NOT NULL,
        o_orderdate DATE NOT NULL,
        o_orderpriority VARCHAR(15) NOT NULL,
        o_clerk VARCHAR(15) NOT NULL,
        o_shippriority INT NOT NULL,
        o_comment VARCHAR(79)
      )

  - name: create_lineitem
    query: |-
      CREATE TABLE IF NOT EXISTS lineitem (
        l_orderkey INT NOT NULL,
        l_partkey INT NOT NULL,
        l_suppkey INT NOT NULL,
        l_linenumber INT NOT NULL,
        l_quantity DECIMAL(15,2) NOT NULL,
        l_extendedprice DECIMAL(15,2) NOT NULL,
        l_discount DECIMAL(15,2) NOT NULL,
        l_tax DECIMAL(15,2) NOT NULL,
        l_returnflag CHAR(1) NOT NULL,
        l_linestatus CHAR(1) NOT NULL,
        l_shipdate DATE NOT NULL,
        l_commitdate DATE NOT NULL,
        l_receiptdate DATE NOT NULL,
        l_shipinstruct VARCHAR(25) NOT NULL,
        l_shipmode VARCHAR(10) NOT NULL,
        l_comment VARCHAR(44),
        PRIMARY KEY (l_orderkey, l_linenumber)
      )

seed:

  - name: populate_region
    query: |-
      INSERT INTO region (r_regionkey, r_name, r_comment) VALUES
        (0,'AFRICA',''), (1,'AMERICA',''), (2,'ASIA',''),
        (3,'EUROPE',''), (4,'MIDDLE EAST','')

  - name: populate_nation
    query: |-
      INSERT INTO nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES
        (0,'ALGERIA',0,''),    (1,'ARGENTINA',1,''),  (2,'BRAZIL',1,''),
        (3,'CANADA',1,''),     (4,'EGYPT',4,''),      (5,'ETHIOPIA',0,''),
        (6,'FRANCE',3,''),     (7,'GERMANY',3,''),    (8,'INDIA',2,''),
        (9,'INDONESIA',2,''),  (10,'IRAN',4,''),      (11,'IRAQ',4,''),
        (12,'JAPAN',2,''),     (13,'JORDAN',4,''),    (14,'KENYA',0,''),
        (15,'MOROCCO',0,''),   (16,'MOZAMBIQUE',0,''), (17,'PERU',1,''),
        (18,'CHINA',2,''),     (19,'ROMANIA',3,''),   (20,'SAUDI ARABIA',4,''),
        (21,'VIETNAM',2,''),   (22,'RUSSIA',3,''),    (23,'UNITED KINGDOM',3,''),
        (24,'UNITED STATES',1,'')

  - name: populate_supplier
    args:
      - suppliers
    query: |-
      WITH RECURSIVE seq AS (
        SELECT 1 AS s UNION ALL SELECT s + 1 FROM seq WHERE s < $1
      )
      INSERT INTO supplier (s_suppkey, s_name, s_address, s_nationkey,
        s_phone, s_acctbal, s_comment)
      SELECT s,
        CONCAT('Supplier#', LPAD(s, 9, '0')),
        SUBSTRING(MD5(RAND()), 1, FLOOR(RAND() * 25 + 15)),
        FLOOR(RAND() * 25),
        CONCAT(LPAD(FLOOR(RAND() * 90 + 10), 2, '0'), '-',
          LPAD(FLOOR(RAND() * 1000), 3, '0'), '-',
          LPAD(FLOOR(RAND() * 1000), 3, '0'), '-',
          LPAD(FLOOR(RAND() * 10000), 4, '0')),
        ROUND(RAND() * 10000 - 1000, 2),
        SUBSTRING(MD5(RAND()), 1, 30)
      FROM seq

  - name: populate_part
    args:
      - batch(parts / batch_size)
      - batch_size
    query: |-
      WITH RECURSIVE seq AS (
        SELECT 1 AS s UNION ALL SELECT s + 1 FROM seq WHERE s < $2
      )
      INSERT INTO part (p_partkey, p_name, p_mfgr, p_brand, p_type,
        p_size, p_container, p_retailprice, p_comment)
      SELECT $1 * $2 + s,
        SUBSTRING(CONCAT(MD5(RAND()), MD5(RAND())), 1, FLOOR(RAND() * 30 + 20)),
        CONCAT('Manufacturer#', FLOOR(RAND() * 5 + 1)),
        CONCAT('Brand#', FLOOR(RAND() * 5 + 1), FLOOR(RAND() * 5 + 1)),
        ELT(FLOOR(RAND() * 6 + 1), 'STANDARD','SMALL','MEDIUM','LARGE','ECONOMY','PROMO'),
        FLOOR(RAND() * 50 + 1),
        ELT(FLOOR(RAND() * 10 + 1), 'SM CASE','SM BOX','SM PACK','MED CASE',
          'MED BOX','MED PACK','LG CASE','LG BOX','LG PACK','WRAP BOX'),
        ROUND((90000 + ($1 * $2 + s) / 10 + RAND() * 100) / 100, 2),
        SUBSTRING(MD5(RAND()), 1, 15)
      FROM seq
      OPTION (MAXRECURSION 10000)

  - name: populate_customer
    args:
      - batch(customers / batch_size)
      - batch_size
    query: |-
      WITH RECURSIVE seq AS (
        SELECT 1 AS s UNION ALL SELECT s + 1 FROM seq WHERE s < $2
      )
      INSERT INTO customer (c_custkey, c_name, c_address, c_nationkey,
        c_phone, c_acctbal, c_mktsegment, c_comment)
      SELECT $1 * $2 + s,
        CONCAT('Customer#', LPAD($1 * $2 + s, 9, '0')),
        SUBSTRING(MD5(RAND()), 1, FLOOR(RAND() * 25 + 15)),
        FLOOR(RAND() * 25),
        CONCAT(LPAD(FLOOR(RAND() * 90 + 10), 2, '0'), '-',
          LPAD(FLOOR(RAND() * 1000), 3, '0'), '-',
          LPAD(FLOOR(RAND() * 1000), 3, '0'), '-',
          LPAD(FLOOR(RAND() * 10000), 4, '0')),
        ROUND(RAND() * 10000 - 1000, 2),
        ELT(FLOOR(RAND() * 5 + 1), 'AUTOMOBILE','BUILDING','FURNITURE',
          'MACHINERY','HOUSEHOLD'),
        SUBSTRING(MD5(RAND()), 1, 40)
      FROM seq
      OPTION (MAXRECURSION 10000)

  - name: populate_orders
    args:
      - batch(orders / batch_size)
      - batch_size
      - customers
    query: |-
      WITH RECURSIVE seq AS (
        SELECT 1 AS s UNION ALL SELECT s + 1 FROM seq WHERE s < $2
      )
      INSERT INTO orders (o_orderkey, o_custkey, o_orderstatus,
        o_totalprice, o_orderdate, o_orderpriority, o_clerk,
        o_shippriority, o_comment)
      SELECT $1 * $2 + s,
        FLOOR(RAND() * $3 + 1),
        ELT(FLOOR(RAND() * 3 + 1), 'O', 'F', 'P'),
        ROUND(RAND() * 400000 + 1000, 2),
        DATE_ADD('1992-01-01', INTERVAL FLOOR(RAND() * 2557) DAY),
        ELT(FLOOR(RAND() * 5 + 1), '1-URGENT','2-HIGH','3-MEDIUM',
          '4-NOT SPECIFIED','5-LOW'),
        CONCAT('Clerk#', LPAD(FLOOR(RAND() * 1000 + 1), 9, '0')),
        0,
        SUBSTRING(MD5(RAND()), 1, 30)
      FROM seq
      OPTION (MAXRECURSION 10000)

  - name: populate_lineitem
    args:
      - batch(orders / batch_size)
      - batch_size
      - parts
      - suppliers
    query: |-
      INSERT INTO lineitem (l_orderkey, l_partkey, l_suppkey, l_linenumber,
        l_quantity, l_extendedprice, l_discount, l_tax, l_returnflag,
        l_linestatus, l_shipdate, l_commitdate, l_receiptdate,
        l_shipinstruct, l_shipmode, l_comment)
      SELECT
        o.o_orderkey,
        FLOOR(RAND() * $3 + 1),
        FLOOR(RAND() * $4 + 1),
        1,
        ROUND(RAND() * 50 + 1, 2),
        ROUND(RAND() * 90000 + 1000, 2),
        ROUND(RAND() * 0.10, 2),
        ROUND(RAND() * 0.08, 2),
        ELT(FLOOR(RAND() * 3 + 1), 'R', 'A', 'N'),
        ELT(FLOOR(RAND() * 2 + 1), 'O', 'F'),
        DATE_ADD(o.o_orderdate, INTERVAL FLOOR(RAND() * 120 + 1) DAY),
        DATE_ADD(o.o_orderdate, INTERVAL FLOOR(RAND() * 90 + 1) DAY),
        DATE_ADD(o.o_orderdate, INTERVAL FLOOR(RAND() * 150 + 1) DAY),
        ELT(FLOOR(RAND() * 4 + 1), 'DELIVER IN PERSON','COLLECT COD',
          'NONE','TAKE BACK RETURN'),
        ELT(FLOOR(RAND() * 7 + 1), 'REG AIR','AIR','RAIL','SHIP',
          'TRUCK','MAIL','FOB'),
        SUBSTRING(MD5(RAND()), 1, 20)
      FROM orders o
      WHERE o.o_orderkey > $1 * $2
        AND o.o_orderkey <= ($1 + 1) * $2

deseed:

  - name: delete_lineitem
    type: exec
    query: DELETE FROM lineitem

  - name: delete_orders
    type: exec
    query: DELETE FROM orders

  - name: delete_partsupp
    type: exec
    query: DELETE FROM partsupp

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

  - name: delete_part
    type: exec
    query: DELETE FROM part

  - name: delete_supplier
    type: exec
    query: DELETE FROM supplier

  - name: delete_nation
    type: exec
    query: DELETE FROM nation

  - name: delete_region
    type: exec
    query: DELETE FROM region

down:

  - name: drop_lineitem
    type: exec
    query: DROP TABLE IF EXISTS lineitem

  - name: drop_orders
    type: exec
    query: DROP TABLE IF EXISTS orders

  - name: drop_partsupp
    type: exec
    query: DROP TABLE IF EXISTS partsupp

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

  - name: drop_part
    type: exec
    query: DROP TABLE IF EXISTS part

  - name: drop_supplier
    type: exec
    query: DROP TABLE IF EXISTS supplier

  - name: drop_nation
    type: exec
    query: DROP TABLE IF EXISTS nation

  - name: drop_region
    type: exec
    query: DROP TABLE IF EXISTS region

run_weights:
  q1_pricing_summary: 25
  q3_shipping_priority: 25
  q6_forecasting_revenue: 25
  q14_promotion_effect: 25

run:

  - name: q1_pricing_summary
    type: query
    args:
      - gen('number:60,120')
    query: |-
      SELECT
        l_returnflag, l_linestatus,
        SUM(l_quantity) AS sum_qty,
        SUM(l_extendedprice) AS sum_base_price,
        SUM(l_extendedprice * (1 - l_discount)) AS sum_disc_price,
        SUM(l_extendedprice * (1 - l_discount) * (1 + l_tax)) AS sum_charge,
        AVG(l_quantity) AS avg_qty,
        AVG(l_extendedprice) AS avg_price,
        AVG(l_discount) AS avg_disc,
        COUNT(*) AS count_order
      FROM lineitem
      WHERE l_shipdate <= DATE_SUB('1998-12-01', INTERVAL ? DAY)
      GROUP BY l_returnflag, l_linestatus
      ORDER BY l_returnflag, l_linestatus

  - name: q3_shipping_priority
    type: query
    args:
      - set_rand(['AUTOMOBILE','BUILDING','FURNITURE','MACHINERY','HOUSEHOLD'], [])
      - gen('number:1,31')
    query: |-
      SELECT
        l.l_orderkey,
        SUM(l.l_extendedprice * (1 - l.l_discount)) AS revenue,
        o.o_orderdate, o.o_shippriority
      FROM customer c
      JOIN orders o ON c.c_custkey = o.o_custkey
      JOIN lineitem l ON l.l_orderkey = o.o_orderkey
      WHERE c.c_mktsegment = ?
        AND o.o_orderdate < DATE_ADD('1995-03-01', INTERVAL ? DAY)
        AND l.l_shipdate > DATE_ADD('1995-03-01', INTERVAL ? DAY)
      GROUP BY l.l_orderkey, o.o_orderdate, o.o_shippriority
      ORDER BY revenue DESC, o.o_orderdate
      LIMIT 10

  - name: q6_forecasting_revenue
    type: query
    args:
      - gen('number:1993,1997')
      - uniform_f(0.02, 0.09, 2)
      - gen('number:24,25')
    query: |-
      SELECT SUM(l_extendedprice * l_discount) AS revenue
      FROM lineitem
      WHERE l_shipdate >= CONCAT(?, '-01-01')
        AND l_shipdate < DATE_ADD(CONCAT(?, '-01-01'), INTERVAL 1 YEAR)
        AND l_discount BETWEEN ? - 0.01 AND ? + 0.01
        AND l_quantity < ?

  - name: q14_promotion_effect
    type: query
    args:
      - gen('number:1993,1997')
      - gen('number:1,12')
    query: |-
      SELECT
        100.00 * SUM(CASE WHEN p.p_type LIKE 'PROMO%'
          THEN l.l_extendedprice * (1 - l.l_discount) ELSE 0 END)
        / SUM(l.l_extendedprice * (1 - l.l_discount)) AS promo_revenue
      FROM lineitem l
      JOIN part p ON l.l_partkey = p.p_partkey
      WHERE l_shipdate >= CONCAT(?, '-', LPAD(?, 2, '0'), '-01')
        AND l_shipdate < DATE_ADD(CONCAT(?, '-', LPAD(?, 2, '0'), '-01'), INTERVAL 1 MONTH)

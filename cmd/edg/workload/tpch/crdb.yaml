# TPC-H Workload
# ==============
# Decision-support benchmark modelled on cockroach workload
# run tpch. Eight tables with a configurable scale factor.
#
# Run queries implement a representative subset of the 22
# TPC-H query templates:
#   Q1  - Pricing Summary (heavy aggregation)
#   Q3  - Shipping Priority (3-table join + aggregation)
#   Q6  - Forecasting Revenue (single-table scan)
#   Q14 - Promotion Effect (2-table join + aggregation)
#
# Known deviations from TPC-H spec:
#   - Data is generated with random distributions rather than
#     the TPC-H dbgen-specified distributions.
#   - Only 4 of 22 queries are included.
#   - Scale factor controls row counts but not exact sizes.

globals:
  scale_factor: int(coalesce(env_nil('SCALE_FACTOR'), 1))
  regions: int(coalesce(env_nil('REGIONS'), 5))
  nations: int(coalesce(env_nil('NATIONS'), 25))
  suppliers: int(coalesce(env_nil('SUPPLIERS'), 100))
  parts: int(coalesce(env_nil('PARTS'), 200))
  customers: int(coalesce(env_nil('CUSTOMERS'), 150))
  orders: int(coalesce(env_nil('ORDERS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_region
    query: |-
      CREATE TABLE IF NOT EXISTS region (
        r_regionkey INT NOT NULL PRIMARY KEY,
        r_name VARCHAR(25) NOT NULL,
        r_comment VARCHAR(152)
      )

  - name: create_nation
    query: |-
      CREATE TABLE IF NOT EXISTS nation (
        n_nationkey INT NOT NULL PRIMARY KEY,
        n_name VARCHAR(25) NOT NULL,
        n_regionkey INT NOT NULL,
        n_comment VARCHAR(152)
      )

  - name: create_supplier
    query: |-
      CREATE TABLE IF NOT EXISTS supplier (
        s_suppkey INT NOT NULL PRIMARY KEY,
        s_name VARCHAR(25) NOT NULL,
        s_address VARCHAR(40) NOT NULL,
        s_nationkey INT NOT NULL,
        s_phone VARCHAR(15) NOT NULL,
        s_acctbal DECIMAL(15,2) NOT NULL,
        s_comment VARCHAR(101)
      )

  - name: create_part
    query: |-
      CREATE TABLE IF NOT EXISTS part (
        p_partkey INT NOT NULL PRIMARY KEY,
        p_name VARCHAR(55) NOT NULL,
        p_mfgr VARCHAR(25) NOT NULL,
        p_brand VARCHAR(10) NOT NULL,
        p_type VARCHAR(25) NOT NULL,
        p_size INT NOT NULL,
        p_container VARCHAR(10) NOT NULL,
        p_retailprice DECIMAL(15,2) NOT NULL,
        p_comment VARCHAR(23)
      )

  - name: create_partsupp
    query: |-
      CREATE TABLE IF NOT EXISTS partsupp (
        ps_partkey INT NOT NULL,
        ps_suppkey INT NOT NULL,
        ps_availqty INT NOT NULL,
        ps_supplycost DECIMAL(15,2) NOT NULL,
        ps_comment VARCHAR(199),
        PRIMARY KEY (ps_partkey, ps_suppkey)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        c_custkey INT NOT NULL PRIMARY KEY,
        c_name VARCHAR(25) NOT NULL,
        c_address VARCHAR(40) NOT NULL,
        c_nationkey INT NOT NULL,
        c_phone VARCHAR(15) NOT NULL,
        c_acctbal DECIMAL(15,2) NOT NULL,
        c_mktsegment VARCHAR(10) NOT NULL,
        c_comment VARCHAR(117)
      )

  - name: create_orders
    query: |-
      CREATE TABLE IF NOT EXISTS orders (
        o_orderkey INT NOT NULL PRIMARY KEY,
        o_custkey INT NOT NULL,
        o_orderstatus CHAR(1) NOT NULL,
        o_totalprice DECIMAL(15,2) NOT NULL,
        o_orderdate DATE NOT NULL,
        o_orderpriority VARCHAR(15) NOT NULL,
        o_clerk VARCHAR(15) NOT NULL,
        o_shippriority INT NOT NULL,
        o_comment VARCHAR(79)
      )

  - name: create_lineitem
    query: |-
      CREATE TABLE IF NOT EXISTS lineitem (
        l_orderkey INT NOT NULL,
        l_partkey INT NOT NULL,
        l_suppkey INT NOT NULL,
        l_linenumber INT NOT NULL,
        l_quantity DECIMAL(15,2) NOT NULL,
        l_extendedprice DECIMAL(15,2) NOT NULL,
        l_discount DECIMAL(15,2) NOT NULL,
        l_tax DECIMAL(15,2) NOT NULL,
        l_returnflag CHAR(1) NOT NULL,
        l_linestatus CHAR(1) NOT NULL,
        l_shipdate DATE NOT NULL,
        l_commitdate DATE NOT NULL,
        l_receiptdate DATE NOT NULL,
        l_shipinstruct VARCHAR(25) NOT NULL,
        l_shipmode VARCHAR(10) NOT NULL,
        l_comment VARCHAR(44),
        PRIMARY KEY (l_orderkey, l_linenumber)
      )

seed:

  - name: populate_region
    query: |-
      INSERT INTO region (r_regionkey, r_name, r_comment)
      SELECT s - 1,
        (ARRAY['AFRICA','AMERICA','ASIA','EUROPE','MIDDLE EAST'])[s],
        substr(md5(random()::FLOAT8::text), 1, 30)
      FROM generate_series(1, 5) AS s

  - name: populate_nation
    query: |-
      INSERT INTO nation (n_nationkey, n_name, n_regionkey, n_comment)
      VALUES
        (0,'ALGERIA',0,''),    (1,'ARGENTINA',1,''),  (2,'BRAZIL',1,''),
        (3,'CANADA',1,''),     (4,'EGYPT',4,''),      (5,'ETHIOPIA',0,''),
        (6,'FRANCE',3,''),     (7,'GERMANY',3,''),    (8,'INDIA',2,''),
        (9,'INDONESIA',2,''),  (10,'IRAN',4,''),      (11,'IRAQ',4,''),
        (12,'JAPAN',2,''),     (13,'JORDAN',4,''),    (14,'KENYA',0,''),
        (15,'MOROCCO',0,''),   (16,'MOZAMBIQUE',0,''), (17,'PERU',1,''),
        (18,'CHINA',2,''),     (19,'ROMANIA',3,''),   (20,'SAUDI ARABIA',4,''),
        (21,'VIETNAM',2,''),   (22,'RUSSIA',3,''),    (23,'UNITED KINGDOM',3,''),
        (24,'UNITED STATES',1,'')

  - name: populate_supplier
    args:
      - suppliers
    query: |-
      INSERT INTO supplier (s_suppkey, s_name, s_address, s_nationkey,
        s_phone, s_acctbal, s_comment)
      SELECT
        s,
        'Supplier#' || lpad(s::TEXT, 9, '0'),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 25 + 15)::INT),
        floor(random()::FLOAT8 * 25)::INT,
        lpad(floor(random()::FLOAT8 * 90 + 10)::INT::TEXT, 2, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 10000)::INT::TEXT, 4, '0'),
        (random()::FLOAT8 * 10000 - 1000)::DECIMAL(15,2),
        substr(md5(random()::FLOAT8::text), 1, 30)
      FROM generate_series(1, $1) AS s

  - name: populate_part
    args:
      - parts
    query: |-
      INSERT INTO part (p_partkey, p_name, p_mfgr, p_brand, p_type,
        p_size, p_container, p_retailprice, p_comment)
      SELECT
        s,
        substr(md5(random()::FLOAT8::text) || md5(random()::FLOAT8::text), 1,
          (random()::FLOAT8 * 30 + 20)::INT),
        'Manufacturer#' || (floor(random()::FLOAT8 * 5) + 1)::INT,
        'Brand#' || (floor(random()::FLOAT8 * 5) + 1)::INT ||
          (floor(random()::FLOAT8 * 5) + 1)::INT,
        (ARRAY['STANDARD','SMALL','MEDIUM','LARGE','ECONOMY',
               'PROMO'])[floor(random()::FLOAT8 * 6 + 1)::INT] || ' ' ||
        (ARRAY['ANODIZED','BURNISHED','PLATED','POLISHED',
               'BRUSHED'])[floor(random()::FLOAT8 * 5 + 1)::INT] || ' ' ||
        (ARRAY['TIN','NICKEL','BRASS','STEEL','COPPER'])[floor(random()::FLOAT8 * 5 + 1)::INT],
        floor(random()::FLOAT8 * 50 + 1)::INT,
        (ARRAY['SM CASE','SM BOX','SM PACK','SM PKG','SM BAG',
               'MED CASE','MED BOX','MED PACK','MED PKG','MED BAG',
               'LG CASE','LG BOX','LG PACK','LG PKG','LG BAG',
               'JUMBO CASE','JUMBO BOX','JUMBO PACK','JUMBO PKG',
               'WRAP CASE','WRAP BOX','WRAP PACK','WRAP PKG',
               'WRAP BAG'])[floor(random()::FLOAT8 * 24 + 1)::INT],
        (90000 + s / 10 + (random()::FLOAT8 * 100)::INT)::DECIMAL(15,2) / 100,
        substr(md5(random()::FLOAT8::text), 1, 15)
      FROM generate_series(1, $1) AS s

  - name: populate_partsupp
    args:
      - parts
      - suppliers
    query: |-
      INSERT INTO partsupp (ps_partkey, ps_suppkey, ps_availqty,
        ps_supplycost, ps_comment)
      SELECT
        p, ((p + si * (($2 / 4)::INT) - 1) % $2) + 1,
        floor(random()::FLOAT8 * 9999 + 1)::INT,
        (random()::FLOAT8 * 1000 + 1)::DECIMAL(15,2),
        substr(md5(random()::FLOAT8::text), 1, 40)
      FROM generate_series(1, $1) AS p
      CROSS JOIN generate_series(0, 3) AS si

  - name: populate_customer
    args:
      - customers
    query: |-
      INSERT INTO customer (c_custkey, c_name, c_address, c_nationkey,
        c_phone, c_acctbal, c_mktsegment, c_comment)
      SELECT
        s,
        'Customer#' || lpad(s::TEXT, 9, '0'),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 25 + 15)::INT),
        floor(random()::FLOAT8 * 25)::INT,
        lpad(floor(random()::FLOAT8 * 90 + 10)::INT::TEXT, 2, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 10000)::INT::TEXT, 4, '0'),
        (random()::FLOAT8 * 10000 - 1000)::DECIMAL(15,2),
        (ARRAY['AUTOMOBILE','BUILDING','FURNITURE',
               'MACHINERY','HOUSEHOLD'])[floor(random()::FLOAT8 * 5 + 1)::INT],
        substr(md5(random()::FLOAT8::text), 1, 40)
      FROM generate_series(1, $1) AS s

  - name: populate_orders
    args:
      - batch(orders / batch_size)
      - batch_size
      - customers
    query: |-
      INSERT INTO orders (o_orderkey, o_custkey, o_orderstatus,
        o_totalprice, o_orderdate, o_orderpriority, o_clerk,
        o_shippriority, o_comment)
      SELECT
        $1::INT * $2::INT + s,
        floor(random()::FLOAT8 * $3 + 1)::INT,
        (ARRAY['O','F','P'])[floor(random()::FLOAT8 * 3 + 1)::INT],
        (random()::FLOAT8 * 400000 + 1000)::DECIMAL(15,2),
        '1992-01-01'::DATE + (random()::FLOAT8 * 2557)::INT,
        (ARRAY['1-URGENT','2-HIGH','3-MEDIUM','4-NOT SPECIFIED',
               '5-LOW'])[floor(random()::FLOAT8 * 5 + 1)::INT],
        'Clerk#' || lpad(floor(random()::FLOAT8 * 1000 + 1)::INT::TEXT, 9, '0'),
        0,
        substr(md5(random()::FLOAT8::text), 1, 30)
      FROM generate_series(1, $2::INT) AS s

  - name: populate_lineitem
    args:
      - batch(orders / batch_size)
      - batch_size
      - parts
      - suppliers
    query: |-
      INSERT INTO lineitem (l_orderkey, l_partkey, l_suppkey, l_linenumber,
        l_quantity, l_extendedprice, l_discount, l_tax, l_returnflag,
        l_linestatus, l_shipdate, l_commitdate, l_receiptdate,
        l_shipinstruct, l_shipmode, l_comment)
      SELECT
        o.o_orderkey, p, ((p - 1) % $4) + 1, ln,
        qty,
        (qty::FLOAT8 * (random()::FLOAT8 * 900 + 100))::DECIMAL(15,2),
        (random()::FLOAT8 * 0.10)::DECIMAL(15,2),
        (random()::FLOAT8 * 0.08)::DECIMAL(15,2),
        (ARRAY['R','A','N'])[floor(random()::FLOAT8 * 3 + 1)::INT],
        (ARRAY['O','F'])[floor(random()::FLOAT8 * 2 + 1)::INT],
        o.o_orderdate + (random()::FLOAT8 * 120 + 1)::INT,
        o.o_orderdate + (random()::FLOAT8 * 90 + 1)::INT,
        o.o_orderdate + (random()::FLOAT8 * 150 + 1)::INT,
        (ARRAY['DELIVER IN PERSON','COLLECT COD',
               'NONE','TAKE BACK RETURN'])[floor(random()::FLOAT8 * 4 + 1)::INT],
        (ARRAY['REG AIR','AIR','RAIL','SHIP','TRUCK',
               'MAIL','FOB'])[floor(random()::FLOAT8 * 7 + 1)::INT],
        substr(md5(random()::FLOAT8::text), 1, 20)
      FROM orders o
      CROSS JOIN LATERAL (
        SELECT floor(random()::FLOAT8 * $3 + 1)::INT AS p,
          (random()::FLOAT8 * 50 + 1)::DECIMAL(15,2) AS qty
      ) item
      CROSS JOIN generate_series(1, floor(random()::FLOAT8 * 4 + 1)::INT) AS ln
      WHERE o.o_orderkey > $1::INT * $2::INT
        AND o.o_orderkey <= ($1::INT + 1) * $2::INT


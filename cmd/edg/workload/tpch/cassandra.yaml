run_weights:
  q1_pricing_summary: 25
  q3_shipping_priority: 25
  q6_forecasting_revenue: 25
  q14_promotion_effect: 25

run:

  # TPC-H Q1: Pricing Summary Report
  # Scans lineitem for shipped items. Cassandra cannot perform
  # GROUP BY with complex aggregations, so this returns raw rows
  # for client-side aggregation.
  - name: q1_pricing_summary
    type: query
    query: |-
      SELECT l_returnflag, l_linestatus, l_quantity, l_extendedprice,
        l_discount, l_tax
      FROM edg.lineitem
      WHERE l_shipdate <= '1998-09-01'
      ALLOW FILTERING

  # TPC-H Q3: Shipping Priority
  # Scans orders for unshipped orders. Cannot JOIN with customer
  # or lineitem in Cassandra; simplified to order table scan.
  - name: q3_shipping_priority
    type: query
    query: |-
      SELECT o_orderkey, o_totalprice, o_orderdate, o_shippriority
      FROM edg.orders
      WHERE o_orderstatus = 'O'
      ALLOW FILTERING

  # TPC-H Q6: Forecasting Revenue Change
  # Single-table scan on lineitem with range predicates.
  # Cassandra cannot compute SUM natively; returns matching rows.
  - name: q6_forecasting_revenue
    type: query
    args:
      - gen('number:1993,1997')
      - uniform_f(0.02, 0.09, 2)
      - gen('number:24,25')
    query: |-
      SELECT l_extendedprice, l_discount
      FROM edg.lineitem
      WHERE l_shipdate >= '$1-01-01' AND l_shipdate < '$1-12-31'
        AND l_quantity < $3
      ALLOW FILTERING

  # TPC-H Q14: Promotion Effect
  # Reads part records. Cannot JOIN with lineitem in Cassandra;
  # simplified to scanning parts with a type prefix filter.
  - name: q14_promotion_effect
    type: query
    query: |-
      SELECT p_partkey, p_type, p_retailprice
      FROM edg.part
      ALLOW FILTERING

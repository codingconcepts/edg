    query: INSERT INTO edg.region (r_regionkey, r_name, r_comment) VALUES (1, 'AMERICA', 'ref')
  - name: populate_region_2
    type: exec
    query: INSERT INTO edg.region (r_regionkey, r_name, r_comment) VALUES (2, 'ASIA', 'ref')
  - name: populate_region_3
    type: exec
    query: INSERT INTO edg.region (r_regionkey, r_name, r_comment) VALUES (3, 'EUROPE', 'ref')
  - name: populate_region_4
    type: exec
    query: INSERT INTO edg.region (r_regionkey, r_name, r_comment) VALUES (4, 'MIDDLE EAST', 'ref')


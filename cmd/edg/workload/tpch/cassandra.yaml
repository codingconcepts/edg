      APPLY BATCH

  - name: populate_supplier
    type: exec_batch
    count: suppliers
    size: 50
    args:
      - iter()
      - regex('[a-zA-Z]{15,25}')
      - regex('[a-zA-Z]{15,40}')
      - gen('number:0,24')
      - regex('[a-zA-Z]{15,15}')
      - uniform_f(-1000.00, 9000.00, 2)
      - regex('[a-zA-Z]{10,30}')
    query: |-
      INSERT INTO edg.supplier (s_suppkey, s_name, s_address, s_nationkey,
        s_phone, s_acctbal, s_comment)
      VALUES ($1, $2, $3, $4, $5, $6, $7)

  - name: populate_part
    type: exec_batch
    count: parts
    size: 50
    args:
      - iter()
      - regex('[a-zA-Z]{20,55}')
      - regex('[a-zA-Z]{10,25}')
      - regex('[a-zA-Z]{5,10}')
      - regex('[a-zA-Z]{10,25}')
      - gen('number:1,50')
      - regex('[a-zA-Z]{5,10}')
      - uniform_f(900.00, 2000.00, 2)
      - regex('[a-zA-Z]{5,23}')
    query: |-
      INSERT INTO edg.part (p_partkey, p_name, p_mfgr, p_brand, p_type,
        p_size, p_container, p_retailprice, p_comment)
      VALUES ($1, $2, $3, $4, $5, $6, $7, $8, $9)

  - name: populate_partsupp
    type: exec_batch
    count: parts
    size: 50
    args:
      - iter()
      - gen('number:1,1000')
      - gen('number:1,9999')
      - uniform_f(1.00, 1000.00, 2)
      - regex('[a-zA-Z]{10,40}')
    query: |-
      INSERT INTO edg.partsupp (ps_partkey, ps_suppkey, ps_availqty,
        ps_supplycost, ps_comment)
      VALUES ($1, $2, $3, $4, $5)

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 50
    args:
      - iter()
      - regex('[a-zA-Z]{10,25}')
      - regex('[a-zA-Z]{15,40}')
      - gen('number:0,24')
      - regex('[a-zA-Z]{15,15}')
      - uniform_f(-1000.00, 9000.00, 2)
      - set_rand(['AUTOMOBILE','BUILDING','FURNITURE','MACHINERY','HOUSEHOLD'], [])
      - regex('[a-zA-Z]{10,40}')
    query: |-
      INSERT INTO edg.customer (c_custkey, c_name, c_address, c_nationkey,
        c_phone, c_acctbal, c_mktsegment, c_comment)

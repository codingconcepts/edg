# TPC-H Workload (Cassandra)
# ==========================
# Cassandra adaptation of the TPC-H decision-support benchmark.
# Eight tables with a configurable scale factor.
#
# Cassandra cannot perform complex aggregations or JOINs natively.
# Run queries are simplified to single-table scans and point reads
# that exercise Cassandra's strengths while keeping the benchmark
# meaningful.
#
# Run queries implement simplified versions of 4 TPC-H templates:
#   Q1  - Pricing Summary (full table scan with ALLOW FILTERING)
#   Q3  - Shipping Priority (single-table scan on orders)
#   Q6  - Forecasting Revenue (single-table scan on lineitem)
#   Q14 - Promotion Effect (single-table scan on part)
#
# Known deviations from TPC-H spec:
#   - No JOINs; each query operates on a single table
#   - Aggregations simplified to scans (Cassandra lacks GROUP BY
#     with complex expressions in older versions)
#   - Scale factor controls row counts but not exact sizes

globals:
  scale_factor: int(coalesce(env_nil('SCALE_FACTOR'), 1))
  regions: int(coalesce(env_nil('REGIONS'), 5))
  nations: int(coalesce(env_nil('NATIONS'), 25))
  suppliers: int(coalesce(env_nil('SUPPLIERS'), 100))
  parts: int(coalesce(env_nil('PARTS'), 200))
  customers: int(coalesce(env_nil('CUSTOMERS'), 150))
  orders: int(coalesce(env_nil('ORDERS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_region
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.region (
        r_regionkey INT,
        r_name TEXT,
        r_comment TEXT,
        PRIMARY KEY (r_regionkey)
      )

  - name: create_nation
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.nation (
        n_nationkey INT,
        n_name TEXT,
        n_regionkey INT,
        n_comment TEXT,
        PRIMARY KEY (n_nationkey)
      )

  - name: create_supplier
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.supplier (
        s_suppkey INT,
        s_name TEXT,
        s_address TEXT,
        s_nationkey INT,
        s_phone TEXT,
        s_acctbal DOUBLE,
        s_comment TEXT,
        PRIMARY KEY (s_suppkey)
      )

  - name: create_part
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.part (
        p_partkey INT,
        p_name TEXT,
        p_mfgr TEXT,
        p_brand TEXT,
        p_type TEXT,
        p_size INT,
        p_container TEXT,
        p_retailprice DOUBLE,
        p_comment TEXT,
        PRIMARY KEY (p_partkey)
      )

  - name: create_partsupp
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.partsupp (
        ps_partkey INT,
        ps_suppkey INT,
        ps_availqty INT,
        ps_supplycost DOUBLE,
        ps_comment TEXT,
        PRIMARY KEY (ps_partkey, ps_suppkey)
      )

  - name: create_customer
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.customer (
        c_custkey INT,
        c_name TEXT,
        c_address TEXT,
        c_nationkey INT,
        c_phone TEXT,
        c_acctbal DOUBLE,
        c_mktsegment TEXT,
        c_comment TEXT,
        PRIMARY KEY (c_custkey)
      )

  - name: create_orders
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.orders (
        o_orderkey INT,
        o_custkey INT,
        o_orderstatus TEXT,
        o_totalprice DOUBLE,
        o_orderdate TEXT,
        o_orderpriority TEXT,
        o_clerk TEXT,
        o_shippriority INT,
        o_comment TEXT,
        PRIMARY KEY (o_orderkey)
      )

  - name: create_lineitem
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.lineitem (
        l_orderkey INT,
        l_linenumber INT,
        l_partkey INT,
        l_suppkey INT,
        l_quantity DOUBLE,
        l_extendedprice DOUBLE,
        l_discount DOUBLE,
        l_tax DOUBLE,
        l_returnflag TEXT,
        l_linestatus TEXT,
        l_shipdate TEXT,
        l_commitdate TEXT,
        l_receiptdate TEXT,
        l_shipinstruct TEXT,
        l_shipmode TEXT,
        l_comment TEXT,
        PRIMARY KEY (l_orderkey, l_linenumber)
      )

seed:


        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (4,'EGYPT',4,'')
        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (5,'ETHIOPIA',0,'')
        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (6,'FRANCE',3,'')
        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (7,'GERMANY',3,'')

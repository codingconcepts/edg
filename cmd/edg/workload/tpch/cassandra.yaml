        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (15,'MOROCCO',0,'')
        INSERT INTO edg.nation (n_nationkey, n_name, n_regionkey, n_comment) VALUES (16,'MOZAMBIQUE',0,'')

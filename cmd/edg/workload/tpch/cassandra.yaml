  - name: drop_orders
    type: exec
    query: DROP TABLE IF EXISTS edg.orders

  - name: drop_partsupp
    type: exec
    query: DROP TABLE IF EXISTS edg.partsupp

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS edg.customer

  - name: drop_part
    type: exec

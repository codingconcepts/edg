  - name: populate_lineitem
    type: exec_batch
    count: orders
    size: 50
    args:
      - iter()
      - gen('number:1,20000')
      - gen('number:1,1000')
      - gen('number:1,4')
      - uniform_f(1.00, 50.00, 2)
      - uniform_f(100.00, 50000.00, 2)
      - uniform_f(0.00, 0.10, 2)
      - uniform_f(0.00, 0.08, 2)
      - set_rand(['R','A','N'], [])
      - set_rand(['O','F'], [])
      - gen('date:1992-01-01,1998-12-31')
      - gen('date:1992-01-01,1998-12-31')
      - gen('date:1992-01-01,1998-12-31')
      - set_rand(['DELIVER IN PERSON','COLLECT COD','NONE','TAKE BACK RETURN'], [])

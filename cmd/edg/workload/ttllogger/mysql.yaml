# TTL Logger Workload for MySQL
#
# MySQL does not have built-in row-level TTL. This workload
# includes a delete_expired operation to simulate TTL GC.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  message_size: int(coalesce(env_nil('MESSAGE_SIZE'), 256))

up:

  - name: create_events
    query: |-
      CREATE TABLE IF NOT EXISTS events (
        id CHAR(36) NOT NULL DEFAULT (UUID()) PRIMARY KEY,
        level VARCHAR(10) NOT NULL,
        source VARCHAR(50) NOT NULL,
        message TEXT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        INDEX idx_events_level_created (level, created_at DESC),
        INDEX idx_events_created (created_at DESC)
      )

seed: []

deseed:

  - name: delete_events
    type: exec
    query: DELETE FROM events

down:

  - name: drop_events
    type: exec
    query: DROP TABLE IF EXISTS events

run_weights:
  write_log: 60
  read_recent: 13
  read_by_level: 13
  delete_expired: 14

run:

  - name: write_log
    type: exec
    args:
      - set_rand(['DEBUG','INFO','WARN','ERROR','FATAL'], [10,50,25,12,3])
      - set_rand(['api','worker','scheduler','auth','billing'], [])
      - regex('[a-zA-Z0-9 ]{64,256}')
    query: |-
      INSERT INTO events (level, source, message)
      VALUES (?, ?, ?)

  - name: read_recent
    type: query
    query: |-
      SELECT id, level, source, message, created_at
      FROM events
      ORDER BY created_at DESC
      LIMIT 20

  - name: read_by_level
    type: query
    args:
      - set_rand(['ERROR','WARN','FATAL'], [60,30,10])
    query: |-
      SELECT id, source, message, created_at
      FROM events
      WHERE level = ?
        AND created_at > DATE_SUB(NOW(), INTERVAL 5 MINUTE)
      ORDER BY created_at DESC
      LIMIT 20

  - name: delete_expired
    type: exec
    query: |-
      DELETE FROM events
      WHERE created_at < DATE_SUB(NOW(), INTERVAL 10 MINUTE)
      LIMIT 1000

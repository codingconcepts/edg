# TTL Logger Workload for Oracle
#
# Oracle does not have built-in row-level TTL. This workload
# includes a delete_expired operation to simulate TTL GC.
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals:
  message_size: int(coalesce(env_nil('MESSAGE_SIZE'), 256))

up:

  - name: create_events
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE events (
            id RAW(16) DEFAULT SYS_GUID() PRIMARY KEY,
            "LEVEL" VARCHAR2(10) NOT NULL,
            source VARCHAR2(50) NOT NULL,
            message VARCHAR2(4000) NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_idx_events_level_created
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE INDEX idx_events_level_created ON events ("LEVEL", created_at DESC)
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_idx_events_created
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE INDEX idx_events_created ON events (created_at DESC)
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed: []

deseed:

  - name: truncate_events
    type: exec
    query: TRUNCATE TABLE events

down:

  - name: drop_events
    type: exec
    query: |-
      BEGIN EXECUTE IMMEDIATE 'DROP TABLE events PURGE';
      EXCEPTION WHEN OTHERS THEN IF SQLCODE != -942 THEN RAISE; END IF; END;

run_weights:
  write_log: 60
  read_recent: 13
  read_by_level: 13
  delete_expired: 14

run:

  - name: write_log
    type: exec
    args:
      - set_rand(['DEBUG','INFO','WARN','ERROR','FATAL'], [10,50,25,12,3])
      - set_rand(['api','worker','scheduler','auth','billing'], [])
      - regex('[a-zA-Z0-9 ]{64,256}')
    query: |-
      INSERT INTO events ("LEVEL", source, message)
      VALUES (:1, :2, :3)

  - name: read_recent
    type: query
    query: |-
      SELECT id, "LEVEL", source, message, created_at
      FROM events
      ORDER BY created_at DESC
      FETCH FIRST 20 ROWS ONLY

  - name: read_by_level
    type: query
    args:
      - set_rand(['ERROR','WARN','FATAL'], [60,30,10])
    query: |-
      SELECT id, source, message, created_at
      FROM events
      WHERE "LEVEL" = :1
        AND created_at > SYSTIMESTAMP - INTERVAL '5' MINUTE
      ORDER BY created_at DESC
      FETCH FIRST 20 ROWS ONLY

  - name: delete_expired
    type: exec
    query: |-
      DELETE FROM events
      WHERE created_at < SYSTIMESTAMP - INTERVAL '10' MINUTE
        AND ROWNUM <= 1000


expectations:
  - error_rate < 1

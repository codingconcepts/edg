# KV Workload (MongoDB)
# =====================
# Simple key-value read/write benchmark.
#
# Single collection with an integer key and a binary value field.
# Operations are point reads and upserts with uniform random key
# distribution.

globals:
  keys: int(coalesce(env_nil('KEYS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  value_size: int(coalesce(env_nil('VALUE_SIZE'), 256))

up:

  - name: create_kv
    type: exec
    query: |-
      {"create": "kv"}

seed:

  - name: populate_kv
    type: exec_batch
    count: keys
    size: batch_size
    args:
      - seq(1, 1)
      - blob(value_size)
    query: |-
      {"insert": "kv", "documents": [{"_id": $1, "k": $1, "v": {"$binary": {"base64": "$2", "subType": "00"}}}]}

deseed:

  - name: delete_kv
    type: exec
    query: |-
      {"delete": "kv", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_kv
    type: exec
    query: |-
      {"drop": "kv"}

run_weights:
  read: 50
  write: 50

run:

  - name: read
    type: query
    args:
      - gen('number:1,' + string(keys))
    query: |-
      {"find": "kv", "filter": {"k": $1}}

  - name: write
    type: exec
    args:
      - gen('number:1,' + string(keys))
      - blob(value_size)
    query: |-
      {"update": "kv", "updates": [{"q": {"k": $1}, "u": {"$set": {"k": $1, "v": {"$binary": {"base64": "$2", "subType": "00"}}}}, "upsert": true}]}


expectations:
  - error_rate < 1

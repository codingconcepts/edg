# KV Workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  keys: int(coalesce(env_nil('KEYS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  value_size: int(coalesce(env_nil('VALUE_SIZE'), 256))

up:

  - name: create_kv
    query: |-
      CREATE TABLE IF NOT EXISTS kv (
        k BIGINT NOT NULL PRIMARY KEY,
        v BLOB NOT NULL
      )

seed:

  - name: populate_kv
    args:
      - batch(keys / batch_size)
      - batch_size
      - value_size
    query: |-
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $2
      )
      INSERT INTO kv (k, v)
      SELECT
        $1 * $2 + s,
        RANDOM_BYTES($3)
      FROM seq

deseed:

  - name: delete_kv
    type: exec
    query: DELETE FROM kv

down:

  - name: drop_kv
    type: exec
    query: DROP TABLE IF EXISTS kv

run_weights:
  read: 50
  write: 50

run:

  - name: read
    type: query
    args:
      - gen('number:1,' + string(keys))
    query: |-
      SELECT k, v FROM kv WHERE k = ?

  - name: write
    type: exec
    args:
      - gen('number:1,' + string(keys))
      - blob(value_size)
    query: |-
      INSERT INTO kv (k, v) VALUES (?, ?)
      ON DUPLICATE KEY UPDATE v = VALUES(v)


expectations:
  - error_rate < 1

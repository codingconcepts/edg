# KV Workload for SQL Server
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  keys: int(coalesce(env_nil('KEYS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  value_size: int(coalesce(env_nil('VALUE_SIZE'), 256))

up:

  - name: create_kv
    query: |-
      IF OBJECT_ID('kv', 'U') IS NULL
      CREATE TABLE kv (
        k BIGINT NOT NULL PRIMARY KEY,
        v VARBINARY(MAX) NOT NULL
      )

seed:

  - name: populate_kv
    args:
      - batch(keys / batch_size)
      - batch_size
      - value_size
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $2
      )
      INSERT INTO kv (k, v)
      SELECT
        $1 * $2 + s,
        CRYPT_GEN_RANDOM($3)
      FROM seq
      OPTION (MAXRECURSION 10000)

deseed:

  - name: delete_kv
    type: exec
    query: DELETE FROM kv

down:

  - name: drop_kv
    type: exec
    query: DROP TABLE IF EXISTS kv

run_weights:
  read: 50
  write: 50

run:

  - name: read
    type: query
    args:
      - gen('number:1,' + string(keys))
    query: |-
      SELECT k, v FROM kv WHERE k = @p1

  - name: write
    type: exec
    args:
      - gen('number:1,' + string(keys))
      - blob(value_size)
    query: |-
      MERGE kv AS t
      USING (SELECT @p1 AS k, @p2 AS v) AS s
      ON t.k = s.k
      WHEN MATCHED THEN UPDATE SET t.v = s.v
      WHEN NOT MATCHED THEN INSERT (k, v) VALUES (s.k, s.v);

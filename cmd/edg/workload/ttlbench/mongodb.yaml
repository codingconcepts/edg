# TTL Bench Workload (MongoDB)
# ============================
# Insert-heavy benchmark that measures write throughput under
# TTL garbage collection pressure. Rows are inserted with a
# timestamp and automatically expire via a TTL index.
#
# The TTL index removes documents after 30 minutes, creating
# background GC pressure that competes with foreground writes.
#
# Use this to test how TTL affects insert throughput and tail
# latency under sustained write load.

globals:
  payload_size: int(coalesce(env_nil('PAYLOAD_SIZE'), 256))

up:

  - name: create_ttlbench
    type: exec
    query: |-
      {"create": "ttlbench"}

  - name: create_ttl_index
    type: exec
    query: |-
      {"createIndexes": "ttlbench", "indexes": [{"key": {"inserted_at": 1}, "name": "ttl_idx", "expireAfterSeconds": 1800}]}

seed: []

deseed:

  - name: delete_ttlbench
    type: exec
    query: |-
      {"delete": "ttlbench", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_ttlbench
    type: exec
    query: |-
      {"drop": "ttlbench"}

run_weights:
  insert_row: 80
  read_recent: 20

run:

  - name: insert_row
    type: exec
    args:
      - gen('uuid')
      - blob(payload_size)
      - date_offset('0s')
    query: |-
      {"insert": "ttlbench", "documents": [{"_id": "$1", "payload": "$2", "inserted_at": {"$date": "$3"}}]}

  - name: read_recent
    type: query
    args:
      - date_offset('-5m')
    query: |-
      {"aggregate": "ttlbench", "pipeline": [{"$match": {"inserted_at": {"$gte": {"$date": "$1"}}}}, {"$sort": {"inserted_at": -1}}, {"$limit": 10}, {"$project": {"_id": 1, "inserted_at": 1}}], "cursor": {}}

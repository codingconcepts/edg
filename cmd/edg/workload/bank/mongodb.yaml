# Bank Workload (MongoDB)
# =======================
# Simulates a banking workload with customers and accounts.
# Operations include balance checks, credits, and transfers.

globals:
  customers: int(coalesce(env_nil('CUSTOMERS'), 1000))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_customer
    type: exec
    query: |-
      {"create": "customer"}

  - name: create_account
    type: exec
    query: |-
      {"create": "account"}

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - objectid()
      - gen('email')
    query: |-
      {"insert": "customer", "documents": [{"_id": {"$oid": "$1"}, "email": "$2"}]}

  - name: fetch_customers
    type: query
    query: |-
      {"find": "customer", "filter": {}}

  - name: populate_account
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - objectid()
      - ref_rand('fetch_customers')._id
      - initial_balance
    query: |-
      {"insert": "account", "documents": [{"_id": {"$oid": "$1"}, "customer_id": {"$oid": "$2"}, "balance": $3}]}

deseed:

  - name: delete_accounts
    type: exec
    query: |-
      {"delete": "account", "deletes": [{"q": {}, "limit": 0}]}

  - name: delete_customers
    type: exec
    query: |-
      {"delete": "customer", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_account
    type: exec
    query: |-
      {"drop": "account"}

  - name: drop_customer
    type: exec
    query: |-
      {"drop": "customer"}

init:

  - name: fetch_accounts
    type: query
    query: |-
      {"find": "account", "filter": {}}

run_weights:
  check_balance: 50
  credit_account: 5
  make_transfer: 45

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts')._id
    query: |-
      {"find": "account", "filter": {"_id": {"$oid": "$1"}}}

  - name: credit_account
    type: exec
    args:
      - ref_rand('fetch_accounts')._id
      - gen('number:1,1000')
    query: |-
      {"update": "account", "updates": [{"q": {"_id": {"$oid": "$1"}}, "u": {"$inc": {"balance": $2}}}]}

  - transaction: make_transfer
    locals:
      amount: gen('number:1,100')
    queries:
      - name: read_source
        type: query
        args:
          - ref_diff('fetch_accounts')._id
        query: |-
          {"find": "account", "filter": {"_id": {"$oid": "$1"}}}

      - rollback_if: "ref_same('read_source').balance < local('amount')"

      - name: read_target
        type: query
        args:
          - ref_diff('fetch_accounts')._id
        query: |-
          {"find": "account", "filter": {"_id": {"$oid": "$1"}}}

      - name: debit_source
        type: exec
        args:
          - ref_same('read_source')._id
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": {"$oid": "$1"}}, "u": {"$inc": {"balance": -$2}}}]}

      - name: credit_target
        type: exec
        args:
          - ref_same('read_target')._id
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": {"$oid": "$1"}}, "u": {"$inc": {"balance": $2}}}]}


expectations:
  - error_rate < 1

# Bank Workload (Cassandra)
# =========================
# Simulates a banking workload with customers and accounts.
# Operations include balance checks, credits, and transfers.

globals:
  customers: int(coalesce(env_nil('CUSTOMERS'), 1000))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_customer
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.customer (
        id UUID PRIMARY KEY,
        email TEXT
      )

  - name: create_account
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.account (
        id UUID PRIMARY KEY,
        customer_id UUID,
        balance DOUBLE
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 50
    args:
      - gen('uuid')
      - gen('email')
    query: |-
      INSERT INTO edg.customer (id, email) VALUES ($1, $2)

  - name: fetch_customers
    type: query
    query: |-
      SELECT id FROM edg.customer

  - name: populate_account
    type: exec_batch
    count: customers
    size: 50
    args:
      - gen('uuid')
      - ref_rand('fetch_customers').id
      - initial_balance
    query: |-
      INSERT INTO edg.account (id, customer_id, balance) VALUES ($1, $2, $3)

deseed:

  - name: truncate_account
    type: exec
    query: TRUNCATE edg.account

  - name: truncate_customer
    type: exec
    query: TRUNCATE edg.customer

down:

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS edg.account

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS edg.customer

  - name: drop_keyspace
    type: exec
    query: DROP KEYSPACE IF EXISTS edg

init:

  - name: fetch_accounts
    type: query
    query: |-
      SELECT id, balance FROM edg.account

run_weights:
  check_balance: 50
  credit_account: 5
  make_transfer: 45

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts').id
    query: |-
      SELECT balance FROM edg.account WHERE id = $1

  - transaction: credit_account
    locals:
      amount: gen('number:1,1000')
    queries:
      - name: read_account
        type: query
        args:
          - ref_rand('fetch_accounts').id
        query: |-
          SELECT id, balance FROM edg.account WHERE id = $1

      - name: update_account
        type: exec
        args:
          - ref_same('read_account').id
          - ref_same('read_account').balance + local('amount')
        query: |-
          UPDATE edg.account SET balance = $2 WHERE id = $1

  - transaction: make_transfer
    locals:
      amount: gen('number:1,100')
    queries:
      - name: read_source
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM edg.account WHERE id = $1

      - rollback_if: "ref_same('read_source').balance < local('amount')"

      - name: read_target
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM edg.account WHERE id = $1

      - name: debit_source
        type: exec
        args:
          - ref_same('read_source').id
          - ref_same('read_source').balance - local('amount')
        query: |-
          UPDATE edg.account SET balance = $2 WHERE id = $1

      - name: credit_target
        type: exec
        args:
          - ref_same('read_target').id
          - ref_same('read_target').balance + local('amount')
        query: |-
          UPDATE edg.account SET balance = $2 WHERE id = $1

# TATP Benchmark Workload for SQL Server
# ========================================
# Telecom Application Transaction Processing benchmark.
# Models a mobile phone subscriber database with 80% reads
# and 20% writes. Simple schema, high throughput.
#
# Schema:
#   subscriber       - Phone subscribers with data fields
#   access_info      - Access records per subscriber
#   special_facility - Special facility flags per subscriber
#   call_forwarding  - Call forwarding rules
#
# Transaction profiles (per TATP spec):
#   get_subscriber_data    - Point lookup by subscriber ID (35%)
#   get_new_destination    - Call forwarding lookup (10%)
#   get_access_data        - Access info lookup (35%)
#   update_subscriber_data - Toggle a subscriber bit (2%)
#   update_location        - Update subscriber location (14%)
#   insert_call_forwarding - Add a forwarding rule (2%)
#   delete_call_forwarding - Remove a forwarding rule (2%)
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  subscribers: int(coalesce(env_nil('SUBSCRIBERS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_subscriber
    query: |-
      IF OBJECT_ID('subscriber', 'U') IS NULL
      CREATE TABLE subscriber (
        s_id INT NOT NULL PRIMARY KEY,
        sub_nbr VARCHAR(15) NOT NULL,
        bit_1 INT NOT NULL DEFAULT 0,
        bit_2 INT NOT NULL DEFAULT 0,
        bit_3 INT NOT NULL DEFAULT 0,
        bit_4 INT NOT NULL DEFAULT 0,
        bit_5 INT NOT NULL DEFAULT 0,
        bit_6 INT NOT NULL DEFAULT 0,
        bit_7 INT NOT NULL DEFAULT 0,
        bit_8 INT NOT NULL DEFAULT 0,
        bit_9 INT NOT NULL DEFAULT 0,
        bit_10 INT NOT NULL DEFAULT 0,
        hex_1 INT NOT NULL DEFAULT 0,
        hex_2 INT NOT NULL DEFAULT 0,
        hex_3 INT NOT NULL DEFAULT 0,
        hex_4 INT NOT NULL DEFAULT 0,
        hex_5 INT NOT NULL DEFAULT 0,
        hex_6 INT NOT NULL DEFAULT 0,
        hex_7 INT NOT NULL DEFAULT 0,
        hex_8 INT NOT NULL DEFAULT 0,
        hex_9 INT NOT NULL DEFAULT 0,
        hex_10 INT NOT NULL DEFAULT 0,
        byte2_1 INT NOT NULL DEFAULT 0,
        byte2_2 INT NOT NULL DEFAULT 0,
        byte2_3 INT NOT NULL DEFAULT 0,
        byte2_4 INT NOT NULL DEFAULT 0,
        byte2_5 INT NOT NULL DEFAULT 0,
        byte2_6 INT NOT NULL DEFAULT 0,
        byte2_7 INT NOT NULL DEFAULT 0,
        byte2_8 INT NOT NULL DEFAULT 0,
        byte2_9 INT NOT NULL DEFAULT 0,
        byte2_10 INT NOT NULL DEFAULT 0,
        msc_location INT NOT NULL DEFAULT 0,
        vlr_location INT NOT NULL DEFAULT 0,
        UNIQUE (sub_nbr)
      )

  - name: create_access_info
    query: |-
      IF OBJECT_ID('access_info', 'U') IS NULL
      CREATE TABLE access_info (
        s_id INT NOT NULL,
        ai_type INT NOT NULL,
        data1 INT NOT NULL DEFAULT 0,
        data2 INT NOT NULL DEFAULT 0,
        data3 VARCHAR(3) NOT NULL DEFAULT '',
        data4 VARCHAR(5) NOT NULL DEFAULT '',
        PRIMARY KEY (s_id, ai_type)
      )

  - name: create_special_facility
    query: |-
      IF OBJECT_ID('special_facility', 'U') IS NULL
      CREATE TABLE special_facility (
        s_id INT NOT NULL,
        sf_type INT NOT NULL,
        is_active INT NOT NULL DEFAULT 1,
        error_cntrl INT NOT NULL DEFAULT 0,
        data_a INT NOT NULL DEFAULT 0,
        data_b VARCHAR(5) NOT NULL DEFAULT '',
        PRIMARY KEY (s_id, sf_type)
      )

  - name: create_call_forwarding
    query: |-
      IF OBJECT_ID('call_forwarding', 'U') IS NULL
      CREATE TABLE call_forwarding (
        s_id INT NOT NULL,
        sf_type INT NOT NULL,
        start_time INT NOT NULL,
        end_time INT NOT NULL,
        numberx VARCHAR(15) NOT NULL,
        PRIMARY KEY (s_id, sf_type, start_time)
      )

seed:

  - name: populate_subscriber
    type: exec_batch
    batch_format: json
    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - template('%015d', seq(1, 1))
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,1')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,15')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,255')
      - gen('number:0,65535')
      - gen('number:0,65535')
    query: |-
      INSERT INTO subscriber (s_id, sub_nbr,
        bit_1, bit_2, bit_3, bit_4, bit_5,
        bit_6, bit_7, bit_8, bit_9, bit_10,
        hex_1, hex_2, hex_3, hex_4, hex_5,
        hex_6, hex_7, hex_8, hex_9, hex_10,
        byte2_1, byte2_2, byte2_3, byte2_4, byte2_5,
        byte2_6, byte2_7, byte2_8, byte2_9, byte2_10,
        msc_location, vlr_location)
      SELECT
        j1.value, j2.value,
        j3.value, j4.value, j5.value, j6.value, j7.value,
        j8.value, j9.value, j10.value, j11.value, j12.value,
        j13.value, j14.value, j15.value, j16.value, j17.value,
        j18.value, j19.value, j20.value, j21.value, j22.value,
        j23.value, j24.value, j25.value, j26.value, j27.value,
        j28.value, j29.value, j30.value, j31.value, j32.value,
        j33.value, j34.value
      FROM OPENJSON('$1') j1
      JOIN OPENJSON('$2') j2 ON j1.[key] = j2.[key]
      JOIN OPENJSON('$3') j3 ON j1.[key] = j3.[key]
      JOIN OPENJSON('$4') j4 ON j1.[key] = j4.[key]
      JOIN OPENJSON('$5') j5 ON j1.[key] = j5.[key]
      JOIN OPENJSON('$6') j6 ON j1.[key] = j6.[key]
      JOIN OPENJSON('$7') j7 ON j1.[key] = j7.[key]
      JOIN OPENJSON('$8') j8 ON j1.[key] = j8.[key]
      JOIN OPENJSON('$9') j9 ON j1.[key] = j9.[key]
      JOIN OPENJSON('$10') j10 ON j1.[key] = j10.[key]
      JOIN OPENJSON('$11') j11 ON j1.[key] = j11.[key]
      JOIN OPENJSON('$12') j12 ON j1.[key] = j12.[key]
      JOIN OPENJSON('$13') j13 ON j1.[key] = j13.[key]
      JOIN OPENJSON('$14') j14 ON j1.[key] = j14.[key]
      JOIN OPENJSON('$15') j15 ON j1.[key] = j15.[key]
      JOIN OPENJSON('$16') j16 ON j1.[key] = j16.[key]
      JOIN OPENJSON('$17') j17 ON j1.[key] = j17.[key]
      JOIN OPENJSON('$18') j18 ON j1.[key] = j18.[key]
      JOIN OPENJSON('$19') j19 ON j1.[key] = j19.[key]
      JOIN OPENJSON('$20') j20 ON j1.[key] = j20.[key]
      JOIN OPENJSON('$21') j21 ON j1.[key] = j21.[key]
      JOIN OPENJSON('$22') j22 ON j1.[key] = j22.[key]
      JOIN OPENJSON('$23') j23 ON j1.[key] = j23.[key]
      JOIN OPENJSON('$24') j24 ON j1.[key] = j24.[key]
      JOIN OPENJSON('$25') j25 ON j1.[key] = j25.[key]
      JOIN OPENJSON('$26') j26 ON j1.[key] = j26.[key]
      JOIN OPENJSON('$27') j27 ON j1.[key] = j27.[key]
      JOIN OPENJSON('$28') j28 ON j1.[key] = j28.[key]
      JOIN OPENJSON('$29') j29 ON j1.[key] = j29.[key]
      JOIN OPENJSON('$30') j30 ON j1.[key] = j30.[key]
      JOIN OPENJSON('$31') j31 ON j1.[key] = j31.[key]
      JOIN OPENJSON('$32') j32 ON j1.[key] = j32.[key]
      JOIN OPENJSON('$33') j33 ON j1.[key] = j33.[key]
      JOIN OPENJSON('$34') j34 ON j1.[key] = j34.[key]

  - name: populate_access_info
    type: exec_batch
    batch_format: json
    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:1,4')
      - gen('number:0,255')
      - gen('number:0,255')
      - regex('[a-z]{3}')
      - regex('[a-z]{5}')
    query: |-
      INSERT INTO access_info (s_id, ai_type, data1, data2, data3, data4)
      SELECT j1.value, j2.value, j3.value, j4.value, j5.value, j6.value
      FROM OPENJSON('$1') j1
      JOIN OPENJSON('$2') j2 ON j1.[key] = j2.[key]
      JOIN OPENJSON('$3') j3 ON j1.[key] = j3.[key]
      JOIN OPENJSON('$4') j4 ON j1.[key] = j4.[key]
      JOIN OPENJSON('$5') j5 ON j1.[key] = j5.[key]
      JOIN OPENJSON('$6') j6 ON j1.[key] = j6.[key]
      WHERE NOT EXISTS (
        SELECT 1 FROM access_info
        WHERE s_id = CAST(j1.value AS INT) AND ai_type = CAST(j2.value AS INT)
      )

  - name: populate_special_facility
    type: exec_batch
    batch_format: json
    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:1,4')
      - gen('number:0,1')
      - gen('number:0,255')
      - gen('number:0,255')
      - regex('[a-z]{5}')
    query: |-
      INSERT INTO special_facility (s_id, sf_type, is_active,
        error_cntrl, data_a, data_b)
      SELECT j1.value, j2.value, j3.value, j4.value, j5.value, j6.value
      FROM OPENJSON('$1') j1
      JOIN OPENJSON('$2') j2 ON j1.[key] = j2.[key]
      JOIN OPENJSON('$3') j3 ON j1.[key] = j3.[key]
      JOIN OPENJSON('$4') j4 ON j1.[key] = j4.[key]
      JOIN OPENJSON('$5') j5 ON j1.[key] = j5.[key]
      JOIN OPENJSON('$6') j6 ON j1.[key] = j6.[key]
      WHERE NOT EXISTS (
        SELECT 1 FROM special_facility
        WHERE s_id = CAST(j1.value AS INT) AND sf_type = CAST(j2.value AS INT)
      )

  - name: populate_call_forwarding
    type: exec_batch
    batch_format: json
    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:1,4')
      - gen('number:0,2')
      - gen('number:1,8')
      - template('%015d', gen('number:1,999999999'))
    query: |-
      INSERT INTO call_forwarding (s_id, sf_type, start_time,
        end_time, numberx)
      SELECT j1.value, j2.value, CAST(j3.value AS INT) * 8,
        CAST(j3.value AS INT) * 8 + CAST(j4.value AS INT), j5.value
      FROM OPENJSON('$1') j1
      JOIN OPENJSON('$2') j2 ON j1.[key] = j2.[key]
      JOIN OPENJSON('$3') j3 ON j1.[key] = j3.[key]
      JOIN OPENJSON('$4') j4 ON j1.[key] = j4.[key]
      JOIN OPENJSON('$5') j5 ON j1.[key] = j5.[key]
      WHERE NOT EXISTS (
        SELECT 1 FROM call_forwarding
        WHERE s_id = CAST(j1.value AS INT)
          AND sf_type = CAST(j2.value AS INT)
          AND start_time = CAST(j3.value AS INT) * 8
      )

deseed:

  - name: delete_call_forwarding
    type: exec
    query: DELETE FROM call_forwarding

  - name: delete_special_facility
    type: exec
    query: DELETE FROM special_facility

  - name: delete_access_info
    type: exec
    query: DELETE FROM access_info

  - name: delete_subscriber
    type: exec
    query: DELETE FROM subscriber

down:

  - name: drop_call_forwarding
    type: exec
    query: DROP TABLE IF EXISTS call_forwarding

  - name: drop_special_facility
    type: exec
    query: DROP TABLE IF EXISTS special_facility

  - name: drop_access_info
    type: exec
    query: DROP TABLE IF EXISTS access_info

  - name: drop_subscriber
    type: exec
    query: DROP TABLE IF EXISTS subscriber

init:

  - name: fetch_subscribers
    type: query
    query: SELECT s_id, sub_nbr FROM subscriber ORDER BY NEWID()

run_weights:
  get_subscriber_data: 35
  get_new_destination: 10
  get_access_data: 35
  update_subscriber_data: 2
  update_location: 14
  insert_call_forwarding: 2
  delete_call_forwarding: 2

run:

  # Point lookup by subscriber ID.
  - name: get_subscriber_data
    type: query
    args:
      - ref_rand('fetch_subscribers').s_id
    query: |-
      SELECT * FROM subscriber WHERE s_id = @p1

  # Look up call forwarding rules for a subscriber.
  - name: get_new_destination
    type: query
    args:
      - ref_rand('fetch_subscribers').s_id
      - gen('number:1,4')
      - gen('number:0,23')
      - gen('number:1,24')
    query: |-
      SELECT cf.numberx
      FROM special_facility sf
      JOIN call_forwarding cf
        ON cf.s_id = sf.s_id AND cf.sf_type = sf.sf_type
      WHERE sf.s_id = @p1 AND sf.sf_type = @p2
        AND sf.is_active = 1
        AND cf.start_time <= @p3 AND cf.end_time > @p4

  # Look up access info for a subscriber.
  - name: get_access_data
    type: query
    args:
      - ref_rand('fetch_subscribers').s_id
      - gen('number:1,4')
    query: |-
      SELECT data1, data2, data3, data4
      FROM access_info
      WHERE s_id = @p1 AND ai_type = @p2

  # Toggle a bit field on a subscriber.
  - name: update_subscriber_data
    type: exec
    args:
      - ref_rand('fetch_subscribers').s_id
      - gen('number:0,1')
    query: |-
      UPDATE subscriber SET bit_1 = @p2
      WHERE s_id = @p1

  # Update subscriber location.
  - name: update_location
    type: exec
    args:
      - ref_rand('fetch_subscribers').sub_nbr
      - gen('number:0,65535')
    query: |-
      UPDATE subscriber SET vlr_location = @p2
      WHERE sub_nbr = @p1

  # Insert a new call forwarding rule.
  - name: insert_call_forwarding
    type: exec
    args:
      - ref_rand('fetch_subscribers').s_id
      - gen('number:1,4')
      - gen('number:0,23')
      - gen('number:1,24')
      - template('%015d', gen('number:1,999999999'))
    query: |-
      INSERT INTO call_forwarding (s_id, sf_type, start_time,
        end_time, numberx)
      SELECT TOP 1 @p1, @p2, @p3, @p4, @p5
      FROM special_facility
      WHERE s_id = @p1 AND sf_type = @p2
        AND NOT EXISTS (
          SELECT 1 FROM call_forwarding
          WHERE s_id = @p1 AND sf_type = @p2 AND start_time = @p3
        )

  # Remove a call forwarding rule.
  - name: delete_call_forwarding
    type: exec
    args:
      - ref_rand('fetch_subscribers').s_id
      - gen('number:1,4')
      - gen('number:0,23')
    query: |-
      DELETE FROM call_forwarding
      WHERE s_id = @p1 AND sf_type = @p2
        AND start_time = @p3


expectations:
  - error_rate < 1

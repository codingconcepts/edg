    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:1,4')
      - gen('number:0,1')
      - gen('number:0,255')
      - gen('number:0,255')
      - regex('[a-z]{5}')
    query: |-
      INSERT IGNORE INTO special_facility (s_id, sf_type, is_active,
        error_cntrl, data_a, data_b)
      SELECT j1.val, j2.val, j3.val, j4.val, j5.val, j6.val
      FROM JSON_TABLE(
        CONCAT('["', REPLACE('$1', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val INT PATH '$', rn FOR ORDINALITY)
      ) j1
      JOIN JSON_TABLE(

  - name: populate_access_info
    type: exec_batch
    count: subscribers
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:1,4')
      - gen('number:0,255')
      - gen('number:0,255')
      - regex('[a-z]{3}')
      - regex('[a-z]{5}')
    query: |-
      INSERT IGNORE INTO access_info (s_id, ai_type, data1, data2, data3, data4)
      SELECT j1.val, j2.val, j3.val, j4.val, j5.val, j6.val
      FROM JSON_TABLE(
        CONCAT('["', REPLACE('$1', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val INT PATH '$', rn FOR ORDINALITY)
      ) j1
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$2', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val INT PATH '$', rn FOR ORDINALITY)
      ) j2 ON j1.rn = j2.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$3', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val INT PATH '$', rn FOR ORDINALITY)
      ) j3 ON j1.rn = j3.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$4', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val INT PATH '$', rn FOR ORDINALITY)
      ) j4 ON j1.rn = j4.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$5', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(3) PATH '$', rn FOR ORDINALITY)
      ) j5 ON j1.rn = j5.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$6', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(5) PATH '$', rn FOR ORDINALITY)
      ) j6 ON j1.rn = j6.rn


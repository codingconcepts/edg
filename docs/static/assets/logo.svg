<svg id="edg-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" overflow="visible">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&amp;display=swap');

    @keyframes edg-breathe {
      0%, 100% { transform: scale(1); }
      33% { transform: scale(1.03); }
      66% { transform: scale(1.01); }
    }
    @keyframes edg-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #edg-blob-wrap {
      animation: edg-breathe 20s ease-in-out infinite, edg-spin 60s linear infinite;
      transform-origin: 200px 200px;
    }
    .edg-letter {
      font-family: 'Comfortaa', sans-serif;
      font-weight: 700;
      font-size: 145px;
      fill: #ffffff;
    }
  </style>

  <defs>
    <linearGradient id="edg-grad" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#9b5de5">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#9b5de5;#f15bb5;#fee440;#00bbf9;#00f5d4;#9b5de5" />
      </stop>
      <stop offset="50%" stop-color="#f15bb5">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#f15bb5;#fee440;#00bbf9;#00f5d4;#9b5de5;#f15bb5" />
      </stop>
      <stop offset="100%" stop-color="#fee440">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#fee440;#00bbf9;#00f5d4;#9b5de5;#f15bb5;#fee440" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Animated blob -->
  <g id="edg-blob-wrap">
    <path id="edg-blob" fill="url(#edg-grad)"
      d="M246,86 C333,72 340,193 287,266 C233,338 92,345 69,243 C46,150 157,107 246,86Z">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.5;0.75;1"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        values="
          M246,86 C333,72 340,193 287,266 C233,338 92,345 69,243 C46,150 157,107 246,86Z;
          M251,85 C338,83 336,200 283,273 C229,345 87,340 64,239 C41,143 166,92 251,85Z;
          M241,90 C329,63 345,199 289,267 C233,335 97,349 71,247 C43,149 146,119 241,90Z;
          M248,83 C335,80 334,191 283,263 C231,335 89,343 65,241 C41,139 161,89 248,83Z;
          M246,86 C333,72 340,193 287,266 C233,338 92,345 69,243 C46,150 157,107 246,86Z
        "
      />
    </path>
  </g>

  <!-- "edg" letterforms: backwards e, d, g (overlapping slightly) -->
  <!-- backwards e (mirrored horizontally around its center) -->
  <text class="edg-letter" text-anchor="middle"
        transform="translate(168, 230) scale(-1, 1)"
        x="0" y="0">e</text>
  <!-- d -->
  <text class="edg-letter" text-anchor="middle"
        x="232" y="230">d</text>
  <!-- g -->
  <text class="edg-letter" text-anchor="middle"
        x="230" y="230">g</text>

</svg>

<svg id="edg-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" overflow="visible">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&amp;display=swap');

    @keyframes edg-breathe {
      0%, 100% { transform: scale(1); }
      33% { transform: scale(1.06); }
      66% { transform: scale(1.02); }
    }
    @keyframes edg-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #edg-blob-wrap {
      animation: edg-breathe 15s ease-in-out infinite, edg-spin 30s linear infinite;
      transform-origin: 195px 190px;
    }
    .edg-letter {
      font-family: 'Comfortaa', sans-serif;
      font-weight: 700;
      font-size: 145px;
      fill: #ffffff;
    }
  </style>

  <defs>
    <linearGradient id="edg-grad" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#F5D88A">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#F5D88A;#F4A683;#F291B4;#C4A8E0;#A3C7F0;#F5D88A" />
      </stop>
      <stop offset="50%" stop-color="#F4A683">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#F4A683;#F291B4;#C4A8E0;#A3C7F0;#F5D88A;#F4A683" />
      </stop>
      <stop offset="100%" stop-color="#F291B4">
        <animate attributeName="stop-color" dur="10s" repeatCount="indefinite"
          values="#F291B4;#C4A8E0;#A3C7F0;#F5D88A;#F4A683;#F291B4" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Animated blob -->
  <g id="edg-blob-wrap">
    <path id="edg-blob" fill="url(#edg-grad)"
      d="M255,91 C342,77 349,198 296,271 C242,343 101,350 78,248 C55,155 166,112 255,91Z">
      <animate
        attributeName="d"
        dur="12s"
        repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.5;0.75;1"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        values="
          M255,91 C342,77 349,198 296,271 C242,343 101,350 78,248 C55,155 166,112 255,91Z;
          M274,89 C357,107 329,219 281,290 C228,361 86,331 65,230 C44,128 195,73 274,89Z;
          M241,100 C336,56 363,212 302,275 C241,338 116,361 82,257 C48,153 138,141 241,100Z;
          M262,84 C349,93 340,192 290,266 C240,340 95,356 72,245 C49,134 167,80 262,84Z;
          M255,91 C342,77 349,198 296,271 C242,343 101,350 78,248 C55,155 166,112 255,91Z
        "
      />
    </path>
  </g>

  <!-- "edg" letterforms: backwards e, d, g — overlapping slightly -->
  <!-- backwards e (mirrored horizontally around its center) -->
  <text class="edg-letter" text-anchor="middle"
        transform="translate(168, 230) scale(-1, 1)"
        x="0" y="0">e</text>
  <!-- d -->
  <text class="edg-letter" text-anchor="middle"
        x="232" y="230">d</text>
  <!-- g -->
  <text class="edg-letter" text-anchor="middle"
        x="230" y="230">g</text>

</svg>

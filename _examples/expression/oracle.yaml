# Expression workload for Oracle
#
# Demonstrates expr-lang features. The expressions are evaluated
# by edg (not the database), so all expr-lang functions work
# identically across databases.
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals:
  prices: [9.99, 19.99, 4.99, 29.99, 14.99]
  tags: [electronics, books, clothing, food, toys]
  names: [Alice, Bob, Charlie, Diana, Eve]
  threshold: 10
  matrix: [[1, 2], [3, 4], [5, 6]]
  products:
    - {name: Widget, price: 29.99, category: tools}
    - {name: Gadget, price: 9.99, category: electronics}
    - {name: Gizmo, price: 19.99, category: tools}
    - {name: Doohickey, price: 4.99, category: toys}
    - {name: Thingamajig, price: 49.99, category: electronics}

expressions:

  grade: |-
    if args[0] >= 90 { "A" }
    else if args[0] >= 70 { "B" }
    else { "F" }

  sum_of_squares: 'let a = float(args[0]); let b = float(args[1]); a**2 + b**2'

up:

  - name: create_expr_demo
    type: exec
    query: |-
      CREATE TABLE expr_demo (
        id NUMBER GENERATED ALWAYS AS IDENTITY,
        label VARCHAR2(255) NOT NULL,
        result VARCHAR2(4000) NOT NULL,
        created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
        PRIMARY KEY (id)
      )

deseed:

  - name: truncate
    type: exec
    query: TRUNCATE TABLE expr_demo

down:

  - name: drop
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE expr_demo CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

run:

  - name: array_predicates
    type: exec
    args:
      - 'all(prices, # > 0)'
      - 'any(prices, # > 25)'
      - 'one(prices, # < 5)'
      - 'none(prices, # < 0)'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'all(# > 0)', :1 FROM DUAL UNION ALL
      SELECT 'any(# > 25)', :2 FROM DUAL UNION ALL
      SELECT 'one(# < 5)', :3 FROM DUAL UNION ALL
      SELECT 'none(# < 0)', :4 FROM DUAL

  - name: array_search
    type: exec
    args:
      - 'find(prices, # > 20)'
      - 'findIndex(prices, # > 20)'
      - 'findLast(prices, # > 10)'
      - 'findLastIndex(prices, # > 10)'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'find(# > 20)', :1 FROM DUAL UNION ALL
      SELECT 'findIndex(# > 20)', :2 FROM DUAL UNION ALL
      SELECT 'findLast(# > 10)', :3 FROM DUAL UNION ALL
      SELECT 'findLastIndex(# > 10)', :4 FROM DUAL

  - name: array_transform
    type: exec
    args:
      - 'join(map(filter(prices, # > threshold), string(#)), ",")'
      - 'join(map(prices, string(# * 2)), ",")'
      - 'join(map(sort(prices), string(#)), ",")'
      - 'join(map(sortBy(products, #.price), #.name), ",")'
      - 'join(reverse(names), ",")'
      - 'join(uniq(concat(tags, ["books", "games"])), ",")'
      - 'join(map(flatten(matrix), string(#)), ",")'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'filter+map', :1 FROM DUAL UNION ALL
      SELECT 'map(# * 2)', :2 FROM DUAL UNION ALL
      SELECT 'sort', :3 FROM DUAL UNION ALL
      SELECT 'sortBy(#.price)', :4 FROM DUAL UNION ALL
      SELECT 'reverse', :5 FROM DUAL UNION ALL
      SELECT 'uniq+concat', :6 FROM DUAL UNION ALL
      SELECT 'flatten', :7 FROM DUAL

  - name: array_aggregate
    type: exec
    args:
      - 'reduce(prices, #acc + #, 0)'
      - 'mean(prices)'
      - 'median(prices)'
      - 'first(names)'
      - 'last(names)'
      - 'join(take(names, 3), ",")'
      - 'len(names)'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'reduce(#acc + #)', :1 FROM DUAL UNION ALL
      SELECT 'mean', :2 FROM DUAL UNION ALL
      SELECT 'median', :3 FROM DUAL UNION ALL
      SELECT 'first', :4 FROM DUAL UNION ALL
      SELECT 'last', :5 FROM DUAL UNION ALL
      SELECT 'take(3)', :6 FROM DUAL UNION ALL
      SELECT 'len(array)', :7 FROM DUAL

  - name: map_functions
    type: exec
    args:
      - 'join(keys({a: 1, b: 2, c: 3}), ",")'
      - 'join(map(values({a: 1, b: 2, c: 3}), string(#)), ",")'
      - 'join(keys(groupBy(products, #.category)), ",")'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'keys', :1 FROM DUAL UNION ALL
      SELECT 'values', :2 FROM DUAL UNION ALL
      SELECT 'groupBy(#.category)', :3 FROM DUAL

  - name: string_operators
    type: exec
    args:
      - '"hello world" contains "world"'
      - '"hello" startsWith "hel"'
      - '"world" endsWith "rld"'
      - '"hello123" matches "^[a-z]+[0-9]+$"'
      - '"books" in tags'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'contains', :1 FROM DUAL UNION ALL
      SELECT 'startsWith', :2 FROM DUAL UNION ALL
      SELECT 'endsWith', :3 FROM DUAL UNION ALL
      SELECT 'matches (regex)', :4 FROM DUAL UNION ALL
      SELECT 'in (membership)', :5 FROM DUAL

  - name: string_functions
    type: exec
    args:
      - trimPrefix("test_value", "test_")
      - trimSuffix("image.png", ".png")
      - 'join(splitAfter("a.b.c", "."), "|")'
      - repeat("ab", 3)
      - indexOf("hello world", "world")
      - lastIndexOf("abcabc", "abc")
      - hasPrefix("hello", "hel")
      - hasSuffix("hello", "llo")
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'trimPrefix', :1 FROM DUAL UNION ALL
      SELECT 'trimSuffix', :2 FROM DUAL UNION ALL
      SELECT 'splitAfter', :3 FROM DUAL UNION ALL
      SELECT 'repeat', :4 FROM DUAL UNION ALL
      SELECT 'indexOf', :5 FROM DUAL UNION ALL
      SELECT 'lastIndexOf', :6 FROM DUAL UNION ALL
      SELECT 'hasPrefix', :7 FROM DUAL UNION ALL
      SELECT 'hasSuffix', :8 FROM DUAL

  - name: type_conversion
    type: exec
    args:
      - type(42)
      - 'toJSON({name: "test", value: 42})'
      - "string(fromJSON('{\"a\": 1}').a)"
      - toBase64("hello")
      - fromBase64("aGVsbG8=")
      - 'len(toPairs({x: 1, y: 2}))'
      - 'join(keys(fromPairs([["x", 1], ["y", 2]])), ",")'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'type', :1 FROM DUAL UNION ALL
      SELECT 'toJSON', :2 FROM DUAL UNION ALL
      SELECT 'fromJSON', :3 FROM DUAL UNION ALL
      SELECT 'toBase64', :4 FROM DUAL UNION ALL
      SELECT 'fromBase64', :5 FROM DUAL UNION ALL
      SELECT 'toPairs', :6 FROM DUAL UNION ALL
      SELECT 'fromPairs', :7 FROM DUAL

  - name: operators
    type: exec
    args:
      - 'reduce(1..5, #acc + #, 0)'
      - 'join(names[1:3], ",")'
      - '{name: "test"}?.missing ?? "default"'
      - grade(85)
      - sum_of_squares(3, 4)
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'range 1..5', :1 FROM DUAL UNION ALL
      SELECT 'slice [1:3]', :2 FROM DUAL UNION ALL
      SELECT '?. + ??', :3 FROM DUAL UNION ALL
      SELECT 'if/else', :4 FROM DUAL UNION ALL
      SELECT 'let bindings', :5 FROM DUAL

  - name: bitwise
    type: exec
    args:
      - bitand(0xFF, 0x0F)
      - bitor(0xF0, 0x0F)
      - bitxor(0xFF, 0x0F)
      - bitnand(0xFF, 0x0F)
      - bitnot(0)
      - bitshl(1, 8)
      - bitshr(256, 4)
      - bitushr(256, 4)
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'bitand(0xFF, 0x0F)', :1 FROM DUAL UNION ALL
      SELECT 'bitor(0xF0, 0x0F)', :2 FROM DUAL UNION ALL
      SELECT 'bitxor(0xFF, 0x0F)', :3 FROM DUAL UNION ALL
      SELECT 'bitnand(0xFF, 0x0F)', :4 FROM DUAL UNION ALL
      SELECT 'bitnot(0)', :5 FROM DUAL UNION ALL
      SELECT 'bitshl(1, 8)', :6 FROM DUAL UNION ALL
      SELECT 'bitshr(256, 4)', :7 FROM DUAL UNION ALL
      SELECT 'bitushr(256, 4)', :8 FROM DUAL

  - name: misc
    type: exec
    args:
      - len("hello")
      - 'get({a: 1, b: 2}, "c") ?? "missing"'
    query: |-
      INSERT INTO expr_demo (label, result)
      SELECT 'len(string)', :1 FROM DUAL UNION ALL
      SELECT 'get + ??', :2 FROM DUAL

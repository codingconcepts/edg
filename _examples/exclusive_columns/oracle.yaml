# Exclusive columns workload for Oracle
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals:
  contacts: 10000
  batch_size: 1000

up:

  - name: create_contact
    type: exec
    query: |-
      CREATE TABLE contact (
        id NUMBER GENERATED ALWAYS AS IDENTITY,
        name VARCHAR2(255) NOT NULL,
        email VARCHAR2(255),
        phone VARCHAR2(50),
        PRIMARY KEY (id),
        CHECK (
          (email IS NOT NULL AND phone IS NULL) OR
          (email IS NULL AND phone IS NOT NULL)
        )
      )

seed:

  - name: populate_contact
    type: exec_batch
    count: contacts
    size: batch_size
    args:
      - gen('name')
      - bool()
      - cond(arg(1), gen('email'), nil)
      - cond(!arg(1), gen('phone'), nil)
    query: |-
      INSERT INTO contact (name, email, phone)
      SELECT n.val, e.val, p.val
      FROM (SELECT column_value AS val, ROWNUM AS rn FROM XMLTABLE(('"' || REPLACE('$1', ',', '","') || '"'))) n
      JOIN (SELECT column_value AS val, ROWNUM AS rn FROM XMLTABLE(('"' || REPLACE('$3', ',', '","') || '"'))) e ON n.rn = e.rn
      JOIN (SELECT column_value AS val, ROWNUM AS rn FROM XMLTABLE(('"' || REPLACE('$4', ',', '","') || '"'))) p ON n.rn = p.rn

deseed:

  - name: truncate_contact
    type: exec
    query: TRUNCATE TABLE contact

down:

  - name: drop_contact
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE contact CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

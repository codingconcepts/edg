# Cross-database consistency example: MySQL side

globals:
  user_count: 1000
  order_count: 5000
  batch_size: 100

up:

  - name: create_users
    query: |-
      CREATE TABLE IF NOT EXISTS users (
        id INT PRIMARY KEY,
        email VARCHAR(255) NOT NULL,
        name VARCHAR(255) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      )

  - name: create_orders
    query: |-
      CREATE TABLE IF NOT EXISTS orders (
        id INT PRIMARY KEY,
        user_id INT NOT NULL,
        amount DECIMAL(10,2) NOT NULL,
        status VARCHAR(50) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES users(id)
      )

seed:

  - name: seed_users
    type: exec_batch
    count: user_count
    size: batch_size
    args:
      - seq(1, 1)
      - gen('email')
      - gen('name')
    query: |-
      INSERT INTO users (id, email, name)
      SELECT CAST(j1.val AS UNSIGNED), j2.val, j3.val
      FROM JSON_TABLE(
        CONCAT('["', REPLACE('$1', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(20) PATH '$', rn FOR ORDINALITY)
      ) j1
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$2', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(255) PATH '$', rn FOR ORDINALITY)
      ) j2 ON j1.rn = j2.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$3', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(255) PATH '$', rn FOR ORDINALITY)
      ) j3 ON j1.rn = j3.rn

  - name: fetch_users
    type: query
    query: SELECT id FROM users

  - name: seed_orders
    type: exec_batch
    count: order_count
    size: batch_size
    args:
      - seq(1, 1)
      - ref_rand('fetch_users').id
      - uniform(10.0, 500.0)
      - set_rand(['pending', 'shipped', 'delivered', 'cancelled'], [40, 35, 20, 5])
    query: |-
      INSERT INTO orders (id, user_id, amount, status)
      SELECT CAST(j1.val AS UNSIGNED), CAST(j2.val AS UNSIGNED), CAST(j3.val AS DECIMAL(10,2)), j4.val
      FROM JSON_TABLE(
        CONCAT('["', REPLACE('$1', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(20) PATH '$', rn FOR ORDINALITY)
      ) j1
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$2', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(20) PATH '$', rn FOR ORDINALITY)
      ) j2 ON j1.rn = j2.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$3', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(20) PATH '$', rn FOR ORDINALITY)
      ) j3 ON j1.rn = j3.rn
      JOIN JSON_TABLE(
        CONCAT('["', REPLACE('$4', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(50) PATH '$', rn FOR ORDINALITY)
      ) j4 ON j1.rn = j4.rn

deseed:

  - name: delete_orders
    type: exec
    query: DELETE FROM orders

  - name: delete_users
    type: exec
    query: DELETE FROM users

down:

  - name: drop_orders
    type: exec
    query: DROP TABLE IF EXISTS orders

  - name: drop_users
    type: exec
    query: DROP TABLE IF EXISTS users
